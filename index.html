<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#131F24">
<title>The Walkthrough</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='42' fill='%23B7E219'/%3E%3Ccircle cx='50' cy='50' r='16' fill='%23131F24'/%3E%3C/svg%3E">
<style>
/* ============ tokens ============ */
:root{
  --bg:#131F24;
  --bg-deep:#0C1519;
  --panel:#1B2A32;
  --panel-2:#202F38;
  --border:#33444E;
  --border-soft:#28373F;
  --text:#F1F7FB;
  --muted:#8FA3AD;
  --faint:#8A9EA8;
  --lime:#B7E219;
  --lime-deep:#8FB405;
  --green:#58CC02;
  --green-deep:#46A302;
  --blue:#49B6FF;      /* Sonnet 5 */
  --purple:#B478FF;    /* Opus 4.8 */
  --coral:#FF6F61;     /* Fable 5 */
  --teal:#2EDACD;      /* Kimi K3 */
  --pink:#FF7AC0;      /* Codex GPT-5.6 Sol */
  --amber:#FFC800;     /* Gemini / Antigravity */
  --grey:#9AA9B2;      /* You / no model */
  --r-lg:24px;
  --r-md:16px;
  --r-sm:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.55;min-height:100vh;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea{font:inherit;color:var(--text)}
::selection{background:rgba(183,226,25,.3)}
a{color:var(--blue)}

/* ============ layout shell ============ */
#app{display:none}
#app.on{display:block}
.shell{display:grid;grid-template-columns:250px minmax(0,1fr) 340px;gap:0;max-width:1400px;margin:0 auto;min-height:100vh}
.sidebar{
  border-right:2px solid var(--border-soft);padding:24px 16px;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;gap:6px;
}
.brand{font-size:1.35rem;font-weight:800;color:var(--lime);letter-spacing:-.02em;padding:8px 12px 20px}
.brand small{display:block;font-size:.68rem;font-weight:700;color:var(--faint);letter-spacing:.14em;margin-top:2px}
.nav-item{
  display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:var(--r-sm);
  font-weight:800;font-size:.82rem;letter-spacing:.1em;color:var(--muted);
  border:2px solid transparent;text-align:left;width:100%;transition:background .15s,color .15s;
}
.nav-item svg{width:26px;height:26px;flex:none}
.nav-item:hover{background:var(--panel)}
.nav-item.active{color:var(--blue);background:rgba(73,182,255,.12);border-color:rgba(73,182,255,.45)}
.sidebar .spacer{flex:1}
.side-coins{padding:10px 14px;display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.8rem;font-weight:700;letter-spacing:.06em}

/* topbar (mobile) */
.topbar{display:none;align-items:center;justify-content:space-between;padding:12px 16px;position:sticky;top:0;background:rgba(19,31,36,.92);backdrop-filter:blur(8px);z-index:30;border-bottom:2px solid var(--border-soft)}
.topbar .brand{padding:0;font-size:1.05rem}
.topstats{display:flex;align-items:center;gap:14px}

/* bottom nav (mobile) */
.bottomnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--bg-deep);border-top:2px solid var(--border-soft);padding:6px 8px calc(6px + env(safe-area-inset-bottom));justify-content:space-around}
.bottomnav .nav-item{flex-direction:column;gap:3px;font-size:.58rem;letter-spacing:.08em;padding:7px 10px;align-items:center}
.bottomnav .nav-item svg{width:24px;height:24px}

.main{padding:28px 32px 120px;min-width:0}
.rail{padding:28px 24px 120px;display:flex;flex-direction:column;gap:18px;position:sticky;top:0;height:100vh;overflow-y:auto}

/* ============ cards & buttons ============ */
.card{background:var(--panel);border:2px solid var(--border);border-radius:var(--r-lg);padding:20px}
.card h3{font-size:.78rem;letter-spacing:.14em;color:var(--muted);font-weight:800;margin-bottom:14px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-weight:800;letter-spacing:.08em;font-size:.85rem;text-transform:uppercase;
  border-radius:14px;padding:13px 22px;transition:transform .08s, filter .15s;user-select:none;
}
.btn:active{transform:translateY(3px)}
.btn-primary{background:var(--lime);color:#131F24;box-shadow:0 4px 0 var(--lime-deep)}
.btn-primary:active{box-shadow:0 1px 0 var(--lime-deep)}
.btn-green{background:var(--green);color:#fff;box-shadow:0 4px 0 var(--green-deep)}
.btn-green:active{box-shadow:0 1px 0 var(--green-deep)}
.btn-ghost{background:var(--panel-2);border:2px solid var(--border);box-shadow:0 4px 0 var(--border-soft);color:var(--text)}
.btn-ghost:active{box-shadow:0 1px 0 var(--border-soft)}
.btn[disabled]{opacity:.4;cursor:not-allowed;transform:none!important}
.btn.small{padding:9px 14px;font-size:.72rem;border-radius:11px}

/* ============ progress banner (ref 1 black pill) ============ */
.progress-pill{
  background:#0B1114;border-radius:var(--r-lg);padding:18px 22px;margin-bottom:22px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;border:2px solid #060a0c;
}
.progress-pill .msg{font-weight:800;font-size:1.05rem}
.progress-pill .sub{color:var(--faint);font-size:.78rem;font-weight:700;letter-spacing:.06em;margin-top:2px}
.ring{position:relative;width:62px;height:62px;flex:none}
.ring .disc{width:100%;height:100%;border-radius:50%;background:conic-gradient(var(--lime) calc(var(--pct)*1%), #2A363B 0)}
.ring .hole{position:absolute;inset:7px;border-radius:50%;background:#0B1114;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem}

/* ============ hero ============ */
.hero{background:var(--panel);border:2px solid var(--border);border-radius:var(--r-lg);padding:26px;margin-bottom:34px}
.hero .eyebrow{color:var(--lime);font-weight:800;font-size:.72rem;letter-spacing:.18em;margin-bottom:6px}
.hero h1{font-size:1.55rem;font-weight:800;letter-spacing:-.01em;margin-bottom:14px}
.badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.badge{
  display:inline-flex;align-items:center;gap:7px;font-size:.7rem;font-weight:800;letter-spacing:.1em;
  padding:6px 12px;border-radius:999px;border:2px solid var(--border);color:var(--muted);background:var(--panel-2);
}
.badge .dot{width:9px;height:9px;border-radius:50%;background:currentColor}
.badge.model{border-color:currentColor;background:transparent}
.task-count{color:var(--faint);font-size:.74rem;font-weight:700;letter-spacing:.08em;margin-bottom:8px}
.task-text{font-size:1.16rem;line-height:1.6;margin-bottom:22px}
.task-text code, .field-body code, .refbody code{background:var(--bg-deep);border:1px solid var(--border-soft);border-radius:6px;padding:1px 6px;font-size:.9em}
.hero-actions{display:flex;flex-wrap:wrap;gap:10px}
.gate-note{color:var(--muted);font-size:.9rem;margin-bottom:14px}

/* checklist rows (ref 1) */
.check-row{
  display:flex;align-items:flex-start;gap:14px;background:var(--panel-2);border:2px solid var(--border-soft);
  border-radius:var(--r-md);padding:14px 16px;margin-bottom:10px;width:100%;text-align:left;transition:border-color .15s;
}
.check-row:hover{border-color:var(--border)}
.check-row .tick{
  width:26px;height:26px;border-radius:50%;border:2px solid var(--faint);flex:none;margin-top:2px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.check-row.done .tick{background:var(--lime);border-color:var(--lime);color:#131F24}
.check-row.done .tick svg{display:block}
.check-row .tick svg{display:none;width:14px;height:14px}
.check-row .lbl{flex:1;font-size:.95rem}
.check-row.done .lbl{color:var(--muted)}
.check-row .done-tag{color:var(--green);font-size:.74rem;font-weight:800;margin-left:8px;flex:none}

/* ============ the map path ============ */
.path{max-width:620px;margin:0 auto}
.unit-divider{display:flex;align-items:center;gap:14px;color:var(--faint);font-weight:800;font-size:.82rem;letter-spacing:.04em;margin:30px 0 22px}
.unit-divider::before,.unit-divider::after{content:"";flex:1;height:2px;background:var(--border-soft)}
.node-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:6px;position:relative;padding-top:52px;transform:translateX(var(--off,0))}
.node{
  width:74px;height:74px;border-radius:50%;position:relative;flex:none;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.35rem;
  color:#0d181d;box-shadow:0 6px 0 rgba(0,0,0,.45);transition:transform .1s;
}
.node:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.45)}
.node.future{opacity:.38}
.node.current{outline:6px solid rgba(255,255,255,.14);outline-offset:5px}
.node svg{width:30px;height:30px}
.node-label{margin-top:12px;font-weight:800;font-size:.86rem;color:var(--muted);text-align:center;max-width:230px}
.node-label small{display:block;color:var(--faint);font-weight:700;font-size:.66rem;letter-spacing:.12em;margin-bottom:1px}
.bubble{
  position:absolute;top:2px;left:50%;transform:translateX(-50%);z-index:5;white-space:nowrap;
  background:var(--bg-deep);border:2px solid var(--border);border-radius:12px;padding:7px 14px;
  color:var(--lime);font-weight:800;font-size:.72rem;letter-spacing:.14em;
  animation:bob 1.6s ease-in-out infinite;
}
.bubble::after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%) rotate(45deg);width:11px;height:11px;background:var(--bg-deep);border-right:2px solid var(--border);border-bottom:2px solid var(--border)}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}

/* ============ rail widgets ============ */
.ladder-rung{
  display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--r-sm);
  border:2px solid var(--border-soft);margin-bottom:8px;width:100%;text-align:left;transition:all .15s;
}
.ladder-rung .swatch{width:14px;height:14px;border-radius:50%;flex:none}
.ladder-rung .nm{font-weight:800;font-size:.88rem}
.ladder-rung .role{color:var(--faint);font-size:.72rem;font-weight:600}
.ladder-rung.on{background:var(--panel-2)}
.ladder-arrow{color:var(--faint);font-size:.74rem;font-weight:700;text-align:center;margin:6px 0 12px}
.strikes{display:flex;gap:6px;align-items:center;margin:10px 0 12px}
.strike-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--faint)}
.strike-dot.hit{background:var(--coral);border-color:var(--coral)}
.strikes .cap{color:var(--faint);font-size:.72rem;font-weight:700;margin-left:6px;letter-spacing:.06em}
.ladder-msg{background:var(--bg-deep);border:2px solid var(--border-soft);border-radius:var(--r-sm);padding:12px 14px;font-size:.86rem;color:var(--text);margin-bottom:12px;display:none}
.ladder-msg.on{display:block}
.ladder-actions{display:flex;flex-direction:column;gap:8px}

.coins-row{display:flex;gap:14px;margin-bottom:12px}
.coin{
  width:52px;height:52px;border-radius:50%;flex:none;position:relative;
  background:radial-gradient(circle at 32% 30%, #ff9a8e, var(--coral) 62%, #c9483c);
  border:3px solid #c9483c;display:flex;align-items:center;justify-content:center;
  font-weight:800;color:#4d130e;font-size:.95rem;box-shadow:0 4px 0 rgba(0,0,0,.4);
  transition:all .5s;
}
.coin.spent{background:var(--panel-2);border-color:var(--border);color:var(--faint);box-shadow:none;transform:scale(.9)}
.coin.spending{animation:spendCoin .7s ease}
@keyframes spendCoin{0%{transform:rotateY(0) scale(1)}60%{transform:rotateY(540deg) scale(1.25)}100%{transform:rotateY(720deg) scale(.9)}}
.coin-cap{font-size:.8rem;color:var(--muted)}
.rail-links .chev-row{margin-bottom:8px}

/* chevron rows (ref 1 "more things to try") */
.chev-row{
  display:flex;align-items:center;gap:13px;width:100%;text-align:left;
  background:var(--panel-2);border:2px solid var(--border-soft);border-radius:var(--r-md);
  padding:13px 15px;font-weight:700;font-size:.9rem;transition:border-color .15s;
}
.chev-row:hover{border-color:var(--border)}
.chev-row .chev{margin-left:auto;color:var(--faint);flex:none}
.chev-row .ico{color:var(--muted);flex:none;display:flex}

/* ============ setup / variables screen ============ */
.setup-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:26px 16px}
.setup-card{width:100%;max-width:560px;background:var(--panel);border:2px solid var(--border);border-radius:var(--r-lg);padding:28px}
.setup-card h1{font-size:1.6rem;font-weight:800;margin-bottom:4px}
.setup-card .sub{color:var(--muted);font-size:.92rem;margin-bottom:22px}
.field{margin-bottom:16px}
.field label{display:block;font-weight:800;font-size:.74rem;letter-spacing:.1em;color:var(--muted);margin-bottom:7px;text-transform:uppercase}
.field input,.field textarea{
  width:100%;background:var(--bg-deep);border:2px solid var(--border);border-radius:var(--r-md);
  padding:13px 15px;font-size:.98rem;outline:none;transition:border-color .15s;resize:vertical;
}
.field input:focus,.field textarea:focus{border-color:var(--lime)}
.field textarea{min-height:84px}

/* ============ modal / sheets ============ */
.overlay{
  position:fixed;inset:0;background:rgba(7,12,15,.78);z-index:100;display:none;
  align-items:flex-end;justify-content:center;padding:0;
}
.overlay.on{display:flex}
.sheet{
  background:var(--bg);border:2px solid var(--border);border-bottom:none;border-radius:var(--r-lg) var(--r-lg) 0 0;
  width:100%;max-width:780px;max-height:92vh;overflow-y:auto;padding:26px 26px 60px;position:relative;
  animation:sheetUp .25s ease;
}
@keyframes sheetUp{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
.sheet-close{
  position:sticky;top:0;float:right;width:42px;height:42px;border-radius:12px;background:var(--panel);
  border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.1rem;z-index:5;
}
.step-head .stepno{font-weight:800;font-size:.72rem;letter-spacing:.16em;margin-bottom:4px}
.step-head h2{font-size:1.5rem;font-weight:800;margin-bottom:16px;padding-right:52px}
.fieldblock{margin-bottom:22px}
.fieldblock>h4{font-size:.72rem;font-weight:800;letter-spacing:.14em;color:var(--muted);margin-bottom:8px;text-transform:uppercase}
.field-body{font-size:.96rem}
.field-body p{margin-bottom:10px}
.field-body ul{margin:0 0 10px 20px}
.field-body li{margin-bottom:8px}
.note-block{background:rgba(255,111,97,.09);border:2px solid rgba(255,111,97,.35);border-radius:var(--r-md);padding:13px 16px;font-size:.93rem;margin-bottom:22px}
.prompt-block{background:var(--bg-deep);border:2px solid var(--border-soft);border-radius:var(--r-md);margin-bottom:12px;overflow:hidden}
.prompt-block .ph{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:2px solid var(--border-soft)}
.prompt-block .ph .t{font-size:.72rem;font-weight:800;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.prompt-block pre{
  padding:14px 16px;white-space:pre-wrap;word-break:break-word;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.86rem;line-height:1.6;color:#D7E4EA;
}
.prompt-block .filled{color:var(--lime)}
.prompt-block .blank{color:var(--amber)}

/* ============ reference view ============ */
.ref-title{font-size:1.5rem;font-weight:800;margin-bottom:6px}
.ref-sub{color:var(--muted);margin-bottom:22px;font-size:.95rem}
.acc{border:2px solid var(--border);border-radius:var(--r-md);margin-bottom:12px;background:var(--panel);overflow:hidden}
.acc-head{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:16px 18px;font-weight:800;font-size:1rem}
.acc-head .chev{margin-left:auto;color:var(--faint);transition:transform .2s}
.acc.open .acc-head .chev{transform:rotate(90deg)}
.acc-body{display:none;padding:4px 20px 20px;border-top:2px solid var(--border-soft)}
.acc.open .acc-body{display:block}
.refbody p{margin-bottom:12px;font-size:.95rem}
.refbody ul{margin:0 0 12px 20px}
.refbody li{margin-bottom:9px;font-size:.95rem}
.refbody h5{font-size:.98rem;font-weight:800;margin:16px 0 8px}
.tbl-wrap{overflow-x:auto;margin-bottom:12px;border:2px solid var(--border-soft);border-radius:var(--r-sm)}
table{border-collapse:collapse;width:100%;min-width:560px;font-size:.86rem}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border-soft);vertical-align:top}
th{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:var(--panel-2)}
tr:last-child td{border-bottom:none}
.mchip{display:inline-flex;align-items:center;gap:6px;font-weight:700;white-space:nowrap}
.mchip .dot{width:8px;height:8px;border-radius:50%;flex:none}

/* ============ finish ============ */
.finish{max-width:560px;margin:40px auto;text-align:center}
.finish .trophy{font-size:5rem;margin-bottom:10px;animation:bob2 2s ease-in-out infinite}
@keyframes bob2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.finish h1{font-size:1.8rem;font-weight:800;margin-bottom:8px}
.finish p{color:var(--muted);margin-bottom:22px}

/* ============ toast ============ */
#toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);z-index:200;opacity:0;
  background:var(--bg-deep);border:2px solid var(--border);border-radius:var(--r-md);padding:14px 20px;
  font-weight:700;font-size:.9rem;max-width:min(520px,90vw);text-align:center;pointer-events:none;
  transition:opacity .25s, transform .25s;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.warn{border-color:var(--coral);color:var(--coral)}

/* ============ responsive ============ */
@media (max-width:1120px){
  .shell{grid-template-columns:220px minmax(0,1fr)}
  .rail{display:none}
  .rail-inline{display:flex;flex-direction:column;gap:16px;margin-bottom:30px}
}
@media (min-width:1121px){.rail-inline{display:none}}
@media (max-width:760px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .topbar{display:flex}
  .bottomnav{display:flex}
  .main{padding:18px 16px 130px}
  .hero{padding:20px}
  .hero h1{font-size:1.3rem}
  .task-text{font-size:1.05rem}
  .node{width:66px;height:66px}
  .node-wrap{transform:translateX(calc(var(--off,0) * .5))}
  .sheet{padding:18px 16px 60px}
  .btn{padding:12px 16px;font-size:.78rem}
  #toast{bottom:calc(96px + env(safe-area-inset-bottom))}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<div id="setupView"></div>
<div id="app">
  <div class="topbar">
    <div class="brand">The Walkthrough</div>
    <div class="topstats" id="topCoins"></div>
  </div>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">The Walkthrough<small>YOUR WEBSITE PLAYBOOK</small></div>
      <button class="nav-item" data-nav="home" id="navHome"></button>
      <button class="nav-item" data-nav="map" id="navMap"></button>
      <button class="nav-item" data-nav="reference" id="navRef"></button>
      <div class="spacer"></div>
      <button class="nav-item" data-nav="vars" id="navVars"></button>
      <div class="side-coins" id="sideCoins"></div>
    </aside>
    <main class="main" id="main"></main>
    <aside class="rail" id="rail"></aside>
  </div>
  <nav class="bottomnav">
    <button class="nav-item" data-nav="home"></button>
    <button class="nav-item" data-nav="map"></button>
    <button class="nav-item" data-nav="reference"></button>
    <button class="nav-item" data-nav="vars"></button>
  </nav>
</div>
<div class="overlay" id="overlay"><div class="sheet" id="sheet" role="dialog" aria-modal="true"></div></div>
<div id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';
/* =====================================================================
   The Walkthrough — v1
   A single-file interactive guided walkthrough of the visual playbook.
   All step and reference content is word-for-word from docs/playbook-source.md.
===================================================================== */

/* ---------- icons ---------- */
const I = {

{ id:'modes', title:'The Modes — how much freedom the model gets while it works', body:

/* =====================================================================
   STATE
===================================================================== */
const KEY = 'walkthrough-v1';
function defaultState(){
  const perStep = {};
  STEPS.forEach(s=>{perStep[s.n]={tasks:s.tasks.map(()=>false),gates:s.gates.map(()=>false),done:false};});
  return {
    version:1,
    vars:{name:'',idea:'',audience:'',feeling:'',sections:''},
    setupDone:false,
    currentStep:0,
    perStep:perStep,
    ladder:{rung:0,strikes:0},
    coins:2,
    coinSpent:{s1:false,s5:false},
    finished:false,
    liveUrl:'',
    view:'home'
  };
}
let S = load();
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return defaultState();
    const d = defaultState(), s = JSON.parse(raw);
    // merge saved state over defaults so older/partial saves survive additions
    const out = Object.assign({}, d, s);
    out.vars = Object.assign({}, d.vars, s.vars||{});
    out.ladder = Object.assign({}, d.ladder, s.ladder||{});
    out.coinSpent = Object.assign({}, d.coinSpent, s.coinSpent||{});
    out.perStep = {};
    STEPS.forEach(st=>{
      const def = d.perStep[st.n], got = (s.perStep||{})[st.n]||{};
      out.perStep[st.n] = {
        tasks: def.tasks.map((_,i)=>!!(got.tasks||[])[i]),
        gates: def.gates.map((_,i)=>!!(got.gates||[])[i]),
        done: !!got.done
      };
    });
    out.currentStep = Math.min(Math.max(+out.currentStep||0, 0), STEPS.length-1);
    return out;
  }catch(e){ return defaultState(); }
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }

/* =====================================================================
   HELPERS
===================================================================== */
const $ = sel => document.querySelector(sel);
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function plainText(html){
  return html.replace(/<[^>]+>/g,'')
    .replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
}
function sentence(t){ t = t.trim(); return /[.!?…”"']$/.test(t) ? t : t+'.'; }

const VAR_FILLS = () => ({
  '[describe it]': S.vars.idea,
  '[audience]': S.vars.audience,
  '[one feeling]': S.vars.feeling,
  '[rough list]': S.vars.sections
});
function fillPrompt(text, noFill){
  let out = text;
  if(!noFill){
    const fills = VAR_FILLS();
    for(const k in fills){ if(fills[k]) out = out.split(k).join(fills[k]); }
  }
  return out;
}
function promptHtml(text, noFill){
  // escape, substitute variables (lime), highlight remaining [blanks] (amber)
  let out = esc(text);
  if(!noFill){
    const fills = VAR_FILLS();
    for(const k in fills){
      if(fills[k]) out = out.split(esc(k)).join('<span class="filled">'+esc(fills[k])+'</span>');
    }
  }
  out = out.replace(/\[([^\]<]+)\]/g,'<span class="blank">[$1]</span>');
  return out;
}
function copyText(text, msg){
  const done = ()=> toast(msg || 'Copied — paste it in.');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>{fallbackCopy(text);done();});
  } else { fallbackCopy(text); done(); }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}
let toastTimer;
function toast(msg, warn){
  const t = $('#toast');
  t.textContent = msg; t.className = warn ? 'on warn' : 'on';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.className=''; }, 4200);
}

function step(n){ return STEPS[n]; }
function ps(n){ return S.perStep[n]; }
function stepModel(n){
  // base model, possibly overridden by ladder escalation on the current step
  if(n===S.currentStep && S.ladder.rung > baseRung(n)) return LADDER[S.ladder.rung];
  return step(n).badges.model;
}
function baseRung(n){
  const i = LADDER.indexOf(step(n).badges.model);
  return i>-1 ? i : 0;
}
function currentTaskIndex(n){
  const p = ps(n);
  for(let i=0;i<p.tasks.length;i++) if(!p.tasks[i]) return i;
  return -1; // all tasks done -> gate phase
}
function doneSteps(){
  let c=0; for(let i=0;i<=9;i++) if(ps(i).done) c++;
  return c;
}
function pct(){ return Math.round(doneSteps()/10*100); }
function bannerMsg(){
  const p = pct();
  if(p===0) return 'Let’s begin.';
  if(p<50) return 'On your way.';
  if(p<100) return 'More than halfway there!';
  return 'You shipped it!';
}
function stuckPrompt(){
  const n = S.currentStep, st = step(n);
  const ti = currentTaskIndex(n);
  const taskText = ti===-1 ? sentence('Finish the step’s gate checklist: '+st.gates.join('; '))
    : sentence(plainText(st.tasks[ti].t));
  const b = st.badges;
  const badges = MODELS[stepModel(n)].name+' / '+b.effort+' / '+b.mode;
  return "I'm following my website playbook. Step "+n+": "+st.name+". Current task: "+taskText+" Expected model / effort / mode: "+badges+". What's happening instead: [player describes here]. Guide me one small action at a time and wait for me between actions.";
}
function escalationPrompt(fromKey, toKey){
  const n = S.currentStep, st = step(n);
  const ti = currentTaskIndex(n);
  const taskText = ti===-1 ? sentence(st.gates.join('; ')) : sentence(plainText(st.tasks[ti].t));
  const who = fromKey==='you' ? 'I have' : MODELS[fromKey].name+' has';
  return 'You are '+MODELS[toKey].name+', taking over a task that '+who+' now tried twice without success. Step '+n+': '+st.name+'. The task, made smaller and clearer: '+taskText+' The exact error message: [paste the exact error message]. Screenshot: [attach a screenshot]. Start fresh — do not build on the previous attempt.';
}

   RENDER — shell & nav
===================================================================== */
function renderNav(){
  const items = [
    ['home','You are here',I.home],['map','The map',I.map],['reference','Reference',I.book],['vars','Edit variables',I.gear]
  ];
  document.querySelectorAll('[data-nav]').forEach(btn=>{
    const key = btn.dataset.nav;
    const it = items.find(x=>x[0]===key);
    btn.innerHTML = it[2]+'<span>'+it[1].toUpperCase()+'</span>';
    btn.classList.toggle('active', S.view===key || (key==='map'&&S.view==='home'&&btn.dataset.scrolled==='1'));
  });
}
function coinHtml(size){
  const spent1 = S.coinSpent.s1, spent2 = S.coinSpent.s5;
  return '<div class="coin'+(spent1?' spent':'')+'" style="width:'+size+'px;height:'+size+'px" title="Fable coin — Step 1">F5</div>'+
         '<div class="coin'+(spent2?' spent':'')+'" style="width:'+size+'px;height:'+size+'px" title="Fable coin — Step 5">F5</div>';
}
function renderCoins(){
  $('#topCoins').innerHTML = coinHtml(30);
  $('#sideCoins').innerHTML = coinHtml(26)+'<span>FABLE COINS</span>';
}

/* =====================================================================
   RENDER — home (hero + path)
===================================================================== */
function badgeRow(n){
  const st = step(n);
  const mk = stepModel(n);
  const m = MODELS[mk];
  let h = '<div class="badges">';
  h += '<span class="badge model" style="color:'+m.colour+'"><span class="dot"></span>MODEL · '+m.name.toUpperCase()+'</span>';
  h += '<span class="badge">EFFORT · '+st.badges.effort+'</span>';
  h += '<span class="badge">MODE · '+st.badges.mode+'</span>';
  return h+'</div>';
}
function renderHero(){
  const n = S.currentStep, st = step(n), p = ps(n);
  const ti = currentTaskIndex(n);
  let inner = '<div class="eyebrow">YOU ARE HERE</div>'
    + '<h1>Step '+n+' — '+st.name+'</h1>'
    + badgeRow(n);

  if(S.finished && n===10){
    inner += '<div class="task-text">'+st.one+'</div>';
    if(st.extra) inner += '<div class="gate-note">'+st.extra+'</div>';
    inner += '<div class="hero-actions"><button class="btn btn-ghost" id="btnStuck">I’M STUCK</button></div>';
  } else if(ti>-1){
    const task = st.tasks[ti];
    inner += '<div class="task-count">TASK '+(ti+1)+' OF '+st.tasks.length+'</div>'
      + '<div class="task-text">'+task.t+'</div>'
      + '<div class="hero-actions">'
      + (task.copy ? '<button class="btn btn-primary" id="btnCopy">'+I.copy+' COPY THE PROMPT</button>' : '')
      + '<button class="btn btn-ghost" id="btnStuck">I’M STUCK</button>'
      + '<button class="btn btn-green" id="btnDone">DONE → NEXT</button>'
      + '</div>';
  } else {
    // gate phase
    inner += '<div class="gate-note"><strong>You are finished when:</strong> tick each gate honestly — the step can’t complete until they’re all ticked.</div>';
    st.gates.forEach((g,i)=>{
      inner += '<button class="check-row'+(p.gates[i]?' done':'')+'" data-gate="'+i+'" aria-pressed="'+!!p.gates[i]+'"><span class="tick">'+I.check+'</span><span class="lbl">'+g+'</span>'+(p.gates[i]?'<span class="done-tag">Done</span>':'')+'</button>';
    });
    const allGates = p.gates.every(Boolean);
    inner += '<div class="hero-actions" style="margin-top:12px">'
      + '<button class="btn btn-ghost" id="btnStuck">I’M STUCK</button>'
      + '<button class="btn btn-green" id="btnComplete" '+(allGates?'':'disabled')+'>COMPLETE STEP →</button>'
      + '</div>';
  }
  return '<section class="hero">'+inner+'</section>';
}
function renderBanner(){
  const p = pct();
  return '<div class="progress-pill"><div><div class="msg">'+bannerMsg()+'</div>'
    + '<div class="sub">STEP '+S.currentStep+' OF 11 · '+(S.vars.name?esc(S.vars.name).toUpperCase():'YOUR PROJECT')+'</div></div>'
    + '<div class="ring"><div class="disc" style="--pct:'+p+'"></div><div class="hole">'+p+'%</div></div></div>';
}
function renderPath(){
  const offsets = [0,-64,-32,42,64,32,0,-52,-70,-30,28];
  let h = '<div class="path" id="mapAnchor">';
  STEPS.forEach((st,i)=>{
    const m = MODELS[st.model];
    const p = ps(i);
    const isCur = i===S.currentStep && !(S.finished&&i<10);
    const cls = p.done?'':'future';
    h += '<div class="unit-divider">STEP '+i+' · '+st.name.toUpperCase()+'</div>';
    h += '<div class="node-wrap" style="--off:'+offsets[i]+'px">'
      + (isCur?'<div class="bubble">YOU ARE HERE</div>':'')
      + '<button class="node '+(isCur?'current':(p.done?'':'future'))+'" data-step="'+i+'" aria-label="Step '+i+': '+st.name+'" style="background:'+m.colour+'">'
      + (p.done?I.check:(''+i))
      + '</button>'
      + '<div class="node-label"><small style="color:'+m.colour+'">'+MODELS[st.model].name.toUpperCase()+'</small>'+st.one.split('—')[0].split('.')[0].slice(0,80)+'…</div>'
      + '</div>';
  });
  return h+'</div>';
}
function renderRailWidgets(){
  const n = S.currentStep;
  const activeRung = Math.max(S.ladder.rung, baseRung(n));
  let ladder = '<div class="card"><h3>THE LADDER</h3>';
  for(let i=LADDER.length-1;i>=0;i--){
    const k = LADDER[i], m = MODELS[k];
    ladder += '<button class="ladder-rung'+(i===activeRung?' on':'')+'" data-rung="'+i+'" style="'+(i===activeRung?'border-color:'+m.colour:'')+'">'
      + '<span class="swatch" style="background:'+m.colour+'"></span>'
      + '<span><span class="nm" style="color:'+m.colour+'">'+m.name+'</span><br><span class="role">'+LADDER_ROLE[k]+'</span></span>'
      + '</button>';
  }
  ladder += '<div class="ladder-arrow">↓ Solved? Go straight back to Sonnet.</div>';
  ladder += '<div class="strikes"><span class="strike-dot'+(S.ladder.strikes>0?' hit':'')+'"></span><span class="strike-dot'+(S.ladder.strikes>1?' hit':'')+'"></span><span class="cap">STRIKES ON THIS TASK</span></div>';
  ladder += '<div class="ladder-msg"></div>';
  ladder += '<div class="ladder-actions"><button class="btn btn-ghost small" data-act="fail">IT FAILED</button>'
    + '<button class="btn btn-ghost small" data-act="solve">SOLVED — BACK TO SONNET</button></div></div>';

  let coins = '<div class="card"><h3>FABLE COINS</h3><div class="coins-row">'+coinHtml(52)+'</div>'
    + '<div class="coin-cap">Fable opens exactly twice per project: Step 1 (writing the plan) and Step 5 (the big animations).</div></div>';

  let links = '<div class="card rail-links"><h3>REFERENCE</h3>';
  if(S.finished) links += '<button class="chev-row" data-act="finish"><span class="ico">🏆</span>The finish screen<span class="chev">'+I.chev+'</span></button>';
  REFERENCE.forEach(r=>{
    links += '<button class="chev-row" data-ref="'+r.id+'"><span class="ico">'+I.book+'</span>'+r.title+'<span class="chev">'+I.chev+'</span></button>';
  });
  links += '</div>';
  return ladder+coins+links;
}
function renderHome(){
  const railInline = '<div class="rail-inline">'+renderRailWidgets()+'</div>';
  $('#main').innerHTML = renderBanner()+renderHero()+railInline+renderPath();
  $('#rail').innerHTML = renderRailWidgets();
  bindHome();
}

/* =====================================================================
   RENDER — reference view
===================================================================== */
function renderReference(openId){
  let h = '<div class="ref-title">Reference</div><div class="ref-sub">The rules of the whole system — all of it, always readable. Nothing is locked behind progress.</div>';
  REFERENCE.forEach(r=>{
    h += '<div class="acc'+(openId===r.id?' open':'')+'" id="acc-'+r.id+'">'
      + '<button class="acc-head" data-acc="'+r.id+'" aria-expanded="'+(openId===r.id)+'">'+r.title+'<span class="chev">'+I.chev+'</span></button>'
      + '<div class="acc-body"><div class="refbody">'+r.body+'</div></div></div>';
  });
  $('#main').innerHTML = h;
  $('#rail').innerHTML = renderRailWidgets();
  document.querySelectorAll('[data-acc]').forEach(b=>b.addEventListener('click',()=>{
    const acc = $('#acc-'+b.dataset.acc);
    acc.classList.toggle('open');
    b.setAttribute('aria-expanded', acc.classList.contains('open'));

}

/* =====================================================================
   RENDER — finish screen
===================================================================== */
function renderFinish(){
  $('#main').innerHTML =
    '<div class="finish"><div class="trophy">🏆</div>'
    + '<h1>The site is live.</h1>'
    + '<p>Steps 0–9 complete, inside the full loop, every gate ticked with your own eyes. Paste the live URL so it’s saved here.</p>'
    + '<div class="field"><label>LIVE URL</label><input id="liveUrl" type="url" placeholder="https://…" value="'+esc(S.liveUrl||'')+'"></div>'
    + '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px">'
    + '<button class="btn btn-primary" id="btnNext">START NEXT PROJECT</button>'
    + '<button class="btn btn-ghost" id="btnStay">KEEP EXPLORING → STEP 10</button></div></div>';
  $('#rail').innerHTML = renderRailWidgets();
  bindRail();
  $('#liveUrl').addEventListener('change',e=>{S.liveUrl=e.target.value;save();});
  $('#btnNext').addEventListener('click',()=>{
    // reset task state; keep the variables editable (Step 0 is one-time — next project starts at Step 1)
    const vars = S.vars, url = S.liveUrl;
    S = defaultState();
    S.vars = vars; S.setupDone = true;
    S.perStep[0].done = true;
    S.perStep[0].tasks = S.perStep[0].tasks.map(()=>true);
    S.perStep[0].gates = S.perStep[0].gates.map(()=>true);
    S.currentStep = 1;
    save();
    openSetup(true);
  });
  $('#btnStay').addEventListener('click',()=>{ S.view='home'; save(); render(); });
}

/* =====================================================================
   RENDER — step card modal
===================================================================== */
let lastFocus = null;
function openStepCard(n, focusSel){
  const st = step(n), p = ps(n), mk = st.badges.model, m = MODELS[mk];
  const freshOpen = !$('#overlay').classList.contains('on');
  if(freshOpen) lastFocus = document.activeElement;
  let h = '<button class="sheet-close" id="sheetClose" aria-label="Close">✕</button>';
  h += '<div class="step-head"><div class="stepno" style="color:'+MODELS[st.model].colour+'">STEP '+n+'</div><h2>'+st.name+'</h2></div>';
  h += '<div class="fieldblock"><h4>In one sentence</h4><div class="field-body">'+st.one+'</div></div>';
  if(st.why) h += '<div class="fieldblock"><h4>Why this step exists</h4><div class="field-body">'+st.why+'</div></div>';
  if(st.note) h += '<div class="note-block">'+st.note+'</div>';
  h += '<div class="fieldblock"><h4>Who does it</h4>'+badgeRowStatic(st)+'<div class="field-body">'+st.who+'</div></div>';
  if(st.tasks.length){
    h += '<div class="fieldblock"><h4>'+(st.tasksTitle||'Do this')+'</h4>';
    st.tasks.forEach((t,i)=>{
      h += '<button class="check-row'+(p.tasks[i]?' done':'')+'" data-mtask="'+i+'" aria-pressed="'+!!p.tasks[i]+'"><span class="tick">'+I.check+'</span><span class="lbl">'+t.t+'</span>'+(p.tasks[i]?'<span class="done-tag">Done</span>':'')+'</button>';
    });
    h += '</div>';
  }
  if(st.prompts.length){
    h += '<div class="fieldblock"><h4>Copy-paste prompts</h4>';
    st.prompts.forEach(pr=>{
      h += '<div class="prompt-block"><div class="ph"><span class="t">'+pr.label+'</span>'
        + '<button class="btn btn-ghost small" data-pcopy="'+pr.id+'">'+I.copy+' COPY</button></div>'
        + '<pre>'+promptHtml(pr.text, pr.noFill)+'</pre></div>';
    });
    h += '</div>';
  }
  if(st.extra) h += '<div class="fieldblock"><div class="field-body">'+st.extra+'</div></div>';
  if(st.gates.length){
    h += '<div class="fieldblock"><h4>You are finished when</h4>';
    st.gates.forEach((g,i)=>{
      h += '<button class="check-row'+(p.gates[i]?' done':'')+'" data-mgate="'+i+'" aria-pressed="'+!!p.gates[i]+'"><span class="tick">'+I.check+'</span><span class="lbl">'+g+'</span>'+(p.gates[i]?'<span class="done-tag">Done</span>':'')+'</button>';
    });
    h += '</div>';
  }
  if(st.then) h += '<div class="fieldblock"><h4>Then</h4><div class="field-body">'+st.then+'</div></div>';
  if(st.wrong){
    h += '<div class="fieldblock"><h4>If it goes wrong</h4><div class="field-body"><ul>';
    st.wrong.forEach(w=>h+='<li>'+w+'</li>');
    h += '</ul></div></div>';
  }
  const sheet = $('#sheet');
  sheet.setAttribute('aria-label','Step '+n+' — '+st.name);
  sheet.innerHTML = h;
  $('#overlay').classList.add('on');
  document.body.style.overflow = 'hidden';
  const focusTarget = focusSel ? sheet.querySelector(focusSel) : null;
  (focusTarget || $('#sheetClose')).focus();
  $('#sheetClose').addEventListener('click', closeSheet);
  sheet.querySelectorAll('[data-pcopy]').forEach(b=>b.addEventListener('click',()=>{
    const pr = st.prompts.find(x=>x.id===b.dataset.pcopy);
    copyText(fillPrompt(pr.text, pr.noFill));
  }));
  sheet.querySelectorAll('[data-mtask]').forEach(b=>b.addEventListener('click',()=>{
    const i = +b.dataset.mtask;
    p.tasks[i] = !p.tasks[i]; save(); openStepCard(n, '[data-mtask="'+i+'"]'); render();
  }));
  sheet.querySelectorAll('[data-mgate]').forEach(b=>b.addEventListener('click',()=>{
    const i = +b.dataset.mgate;
    p.gates[i] = !p.gates[i]; save(); openStepCard(n, '[data-mgate="'+i+'"]'); render();
  }));
}
function badgeRowStatic(st){
  const m = MODELS[st.badges.model];
  return '<div class="badges">'
    + '<span class="badge model" style="color:'+m.colour+'"><span class="dot"></span>MODEL · '+m.name.toUpperCase()+'</span>'
    + '<span class="badge">EFFORT · '+st.badges.effort+'</span>'
    + '<span class="badge">MODE · '+st.badges.mode+'</span></div>';
}
function closeSheet(){
  $('#overlay').classList.remove('on');
  document.body.style.overflow = '';
  if(lastFocus && lastFocus.focus) lastFocus.focus();
  lastFocus = null;
}

/* =====================================================================
   SETUP / VARIABLES SCREEN
===================================================================== */
function openSetup(editMode){
  const v = S.vars;
  $('#app').classList.remove('on');
  $('#setupView').innerHTML =
  '<div class="setup-wrap"><div class="setup-card">'
  + '<h1>'+(editMode?'Edit variables':'First setup')+'</h1>'
  + '<div class="sub">'+(editMode?'Change anything — every prompt in the app updates instantly.':'Answer once. Every prompt in the whole app auto-fills these into its brackets from then on.')+'</div>'
  + '<div class="field"><label>Project name</label><input id="v-name" value="'+esc(v.name)+'" placeholder="my-site"></div>'
  + '<div class="field"><label>Your site idea (a paragraph)</label><textarea id="v-idea" placeholder="What are you building?">'+esc(v.idea)+'</textarea></div>'
  + '<div class="field"><label>Who is it for?</label><input id="v-audience" value="'+esc(v.audience)+'" placeholder="The audience"></div>'
  + '<div class="field"><label>The one feeling a visitor should get</label><input id="v-feeling" value="'+esc(v.feeling)+'" placeholder="e.g. calm confidence"></div>'
  + '<div class="field"><label>Rough list of pages and sections</label><textarea id="v-sections" placeholder="hero, about, gallery, contact…">'+esc(v.sections)+'</textarea></div>'
  + '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:20px">'
  + '<button class="btn btn-primary" id="setupGo">'+(editMode?'SAVE CHANGES':'START THE WALKTHROUGH')+'</button>'
  + (editMode?'<button class="btn btn-ghost" id="setupCancel">CANCEL</button>':'')
  + '</div></div></div>';
  $('#setupView').style.display='block';
  $('#setupGo').addEventListener('click',()=>{
    S.vars = {
      name:$('#v-name').value.trim(), idea:$('#v-idea').value.trim(),

      sections:$('#v-sections').value.trim()
    };

    $('#setupView').style.display='none'; $('#setupView').innerHTML='';

  if(editMode) $('#setupCancel').addEventListener('click',()=>{
    $('#setupView').style.display='none'; $('#setupView').innerHTML='';
    $('#app').classList.add('on'); render();

}

/* =====================================================================
   MECHANICS — ticking, gates, ladder, coins
===================================================================== */
function tickCurrentTask(){
  const n = S.currentStep;
  const ti = currentTaskIndex(n);
  if(ti===-1) return;
  ps(n).tasks[ti] = true;
  // a new task = a fresh two tries (strikes are per task)
  S.ladder = {rung:baseRung(n), strikes:0};
  ladderMsgText = '';
  save(); render();
}
function completeStep(){
  const n = S.currentStep, p = ps(n);
  if(!p.gates.every(Boolean)) return;
  p.done = true;
  // Fable coins: Steps 1 and 5 each spend one
  let coin = false;
  if(n===1 && !S.coinSpent.s1){ S.coinSpent.s1=true; S.coins--; coin=true; }
  if(n===5 && !S.coinSpent.s5){ S.coinSpent.s5=true; S.coins--; coin=true; }
  if(n===9){ S.finished = true; S.currentStep = 10; S.view = 'finish'; }
  else if(n<10){ S.currentStep = n+1; }
  S.ladder = {rung:baseRung(S.currentStep), strikes:0};
  ladderMsgText = '';
  save();
  render();
  // animate + announce on the freshly rendered DOM
  if(coin) spendAnim(n);
  else if(n!==9) toast('Step '+n+' complete. On to Step '+S.currentStep+' — '+step(S.currentStep).name+'.');
}
function spendAnim(n){
  const idx = n===1 ? 0 : 1;
  document.querySelectorAll('.coins-row, #topCoins, #sideCoins').forEach(row=>{
    const coins = row.querySelectorAll('.coin');
    if(coins[idx]) coins[idx].classList.add('spending');
  });
  toast('Step '+n+' complete — a Fable coin is spent, that’s one of its two openings. On to Step '+S.currentStep+' — '+step(S.currentStep).name+'.');
}
function ladderFail(){
  const n = S.currentStep;
  const rung = Math.max(S.ladder.rung, baseRung(n));
  S.ladder.rung = rung;
  S.ladder.strikes++;
  if(S.ladder.strikes===1){
    showLadderMsg('Improve the prompt: add the exact error message and a screenshot, make the task smaller. Try once more.');
  } else {
    S.ladder.strikes = 0;
    if(rung < 2){
      const from = stepModel(n), to = LADDER[rung+1];
      S.ladder.rung = rung+1;
      if(to==='fable' && n!==1 && n!==5){
        showLadderMsg('Genuine emergency — Fable’s third permitted use (Sonnet AND Opus have each failed twice). Escalation prompt copied.');
      } else {
        showLadderMsg('Two strikes — climb one rung. '+MODELS[to].name+' takes over. Escalation prompt copied.');
      }
      copyText(escalationPrompt(from,to),'Escalation prompt copied for '+MODELS[to].name+'.');
    } else {
      showLadderMsg('Fable has had its two tries. Make the task smaller and clearer — or split it into two smaller tasks. Never argue with a model for an hour.');
    }
  }
  save(); render();
}
function ladderSolve(){
  S.ladder = {rung:0, strikes:0};
  ladderMsgText = '';
  save(); render();
  toast('Solved — back home to Sonnet (Rule 1).');
}
let ladderMsgText = '';
function showLadderMsg(msg){ ladderMsgText = msg; }
function ladderTap(rung){
  const n = S.currentStep;
  if(LADDER[rung]==='fable' && n!==1 && n!==5 && !(S.ladder.rung===2)){
    toast('Rule 2 — Fable opens twice per project. This isn’t one of them.', true);
    return;
  }
  if(rung===0){ ladderSolve(); return; }
  S.ladder.rung = rung; S.ladder.strikes = 0;
  ladderMsgText = '';
  save(); render();
}

/* =====================================================================
   BINDINGS
===================================================================== */
function bindRail(){
  document.querySelectorAll('[data-ref]').forEach(b=>b.addEventListener('click',()=>{
    S.view='reference'; save(); render(b.dataset.ref);
  }));
  // ladder + coin widgets can appear twice (rail + inline) — bind them all
  document.querySelectorAll('[data-act="fail"]').forEach(b=>b.addEventListener('click',ladderFail));
  document.querySelectorAll('[data-act="solve"]').forEach(b=>b.addEventListener('click',ladderSolve));
  document.querySelectorAll('[data-act="finish"]').forEach(b=>b.addEventListener('click',()=>{
    S.view='finish'; save(); render();
  }));
  document.querySelectorAll('[data-rung]').forEach(b=>b.addEventListener('click',()=>ladderTap(+b.dataset.rung)));
  if(ladderMsgText){
    document.querySelectorAll('.ladder-msg').forEach(el=>{el.textContent=ladderMsgText;el.classList.add('on');});
  }
}
function bindHome(){
  const btnCopy = $('#btnCopy');
  if(btnCopy) btnCopy.addEventListener('click',()=>{
    const st = step(S.currentStep), ti = currentTaskIndex(S.currentStep);
    const pr = st.prompts.find(x=>x.id===st.tasks[ti].copy);
    if(pr) copyText(fillPrompt(pr.text, pr.noFill));
  });
  document.querySelectorAll('[id="btnStuck"]').forEach(b=>b.addEventListener('click',()=>{
    copyText(stuckPrompt(),'Help prompt copied — paste it into Claude (Sonnet) and describe what’s happening.');
  }));
  const btnDone = $('#btnDone');
  if(btnDone) btnDone.addEventListener('click',tickCurrentTask);
  const btnComplete = $('#btnComplete');
  if(btnComplete) btnComplete.addEventListener('click',completeStep);
  document.querySelectorAll('[data-gate]').forEach(b=>b.addEventListener('click',()=>{
    const i = +b.dataset.gate;
    ps(S.currentStep).gates[i] = !ps(S.currentStep).gates[i];
    save(); render();
  }));
  document.querySelectorAll('[data-step]').forEach(b=>b.addEventListener('click',()=>openStepCard(+b.dataset.step)));
  bindRail();
}

/* =====================================================================
   MAIN RENDER
===================================================================== */
function render(refId){
  renderNav(); renderCoins();
  if(S.view==='finish'){ renderFinish(); return; }
  if(S.view==='reference'){ renderReference(refId); return; }
  renderHome();
}
document.querySelectorAll('[data-nav]').forEach(btn=>btn.addEventListener('click',()=>{
  const k = btn.dataset.nav;
  if(k==='vars'){ openSetup(true); return; }
  if(k==='map'){ S.view='home'; save(); render();
    const a = $('#mapAnchor'); if(a) a.scrollIntoView({behavior:'smooth'}); return; }
  S.view = k; save(); render();
}));
$('#overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeSheet(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSheet(); });

/* boot */
if(!S.setupDone){ openSetup(false); }
else { $('#app').classList.add('on'); render(); }
</script>
