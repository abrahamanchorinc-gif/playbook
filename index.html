      <button class="btn btn-green" data-action="task-done">DONE → NEXT</button></div>`;
  }else{
    const gates=STEP_GATES[n];
    body += `<div class="gate-note"><strong>You are finished when:</strong> confirm each gate honestly. The step cannot complete until every visible gate is checked.</div>`;
    gates.forEach(gate=>{
      const done=!!state.gates[gate.id];
      body += `<button class="check-row ${done?'done':''}" data-action="toggle-gate" data-step="${n}" data-id="${gate.id}" aria-pressed="${done}">
        <span class="tick">${ICONS.check}</span><span class="lbl">${inlineMarkdown(gate.text)}<span class="meta">${rulePill(gate.rule,true)}</span></span>${done?'<span class="done-tag">Done</span>':''}</button>`;

  }
  return `<section class="hero">${body}</section>`;
}

function formatDuration(ms){
  const total=Math.max(0,Math.floor(ms/1000));
  const hours=Math.floor(total/3600),minutes=Math.floor((total%3600)/60),seconds=total%60;
  return [hours,minutes,seconds].map(value=>String(value).padStart(2,'0')).join(':');
}

function sessionElapsed(session){
  if(!session) return 0;
  return (session.elapsedMs||0)+(session.running&&session.startedAt?Date.now()-session.startedAt:0);
}

  }else{
    const titles={B:'Part B — Operating rules',C:'Part C — The 11 steps',D:'Part D — Quick reference',E:'Part E — Troubleshooting, costs, and Project Zero'};
    content=Object.entries(titles).map(([key,title])=>`<section class="acc"><button class="acc-head" data-action="reference-toggle" aria-expanded="false" aria-controls="reference-${key}">${esc(title)}<span class="chev" aria-hidden="true">›</span></button>
      <div class="acc-body" id="reference-${key}"><div class="source-label">Canonical playbook · verbatim source</div><div class="canonical">${markdownToHtml(SOURCE.parts[key])}</div></div></section>`).join('');
  }
  $('#main').innerHTML=`${viewHeader('Canonical source','Reference','Parts B–E remain available in full, regardless of project track or tool settings.')}
    ${legendHtml()}${content}`;
  $('#rail').innerHTML=`<div class="card"><h3>CONTENT RULE</h3><p class="coin-cap">Canonical playbook text is loaded directly from docs/playbook-source.md. Preview summaries and FORMA-9 artifacts are labelled separately.</p></div>`;
}

function render(){
  const p=project();
  $('#setupView').style.display='none';
  $('#app').classList.add('on');
  renderNavigation();
  if(p.view==='map') renderMap();
  else if(p.view==='projects') renderProjects();
  else if(p.view==='reference') renderReference();
  else if(p.view==='settings') renderSettings();
  else renderHome();
  updateTimerDisplay();
}

function checklistHtml(n,interactive){
  const state=stepState(n);
  let html='<div class="fieldblock"><h4>Guided task checklist</h4>';
  filteredTasks(n).forEach(task=>{
    const done=!!state.tasks[task.id];
    html += `<button class="check-row ${done?'done':''} ${interactive?'':'locked'}" ${interactive?`data-action="sheet-task" data-step="${n}" data-id="${task.id}"`:'disabled'} aria-pressed="${done}">
      <span class="tick">${ICONS.check}</span><span class="lbl">${inlineMarkdown(task.text)}<span class="meta">${rulePill(task.rule,true)}</span></span>${done?'<span class="done-tag">Done</span>':''}</button>`;
  });
  html+='</div>';
  if(STEP_GATES[n].length){
    html+='<div class="fieldblock"><h4>Gates</h4>';
    STEP_GATES[n].forEach(gate=>{
      const done=!!state.gates[gate.id];
      html += `<button class="check-row ${done?'done':''} ${interactive?'':'locked'}" ${interactive?`data-action="sheet-gate" data-step="${n}" data-id="${gate.id}"`:'disabled'} aria-pressed="${done}">
        <span class="tick">${ICONS.check}</span><span class="lbl">${inlineMarkdown(gate.text)}<span class="meta">${rulePill(gate.rule,true)}</span></span>${done?'<span class="done-tag">Done</span>':''}</button>`;
    });
    html+='</div>';
  }
  return html;
}

function openStep(n,forceFull=false){
  const p=project(),state=stepState(n),future=n>p.currentStep&&!state.done;
  const preview=future&&!forceFull;
  if(!$('#overlay').classList.contains('on')) lastFocus=document.activeElement;
  let body='';
  if(preview){
    body=`<div class="preview-card"><div class="source-label">Friendly preview · app-authored</div>
      <p class="preview-lead">${esc(PREVIEWS[n])}</p>
      <div class="preview-note"><span>👀</span><span>Looking ahead does not start this step or change your progress. Open full detail only when you want the complete canonical instructions.</span></div>
      <div style="margin-top:20px">${renderExample(n,true)}</div>
      <div class="hero-actions" style="margin-top:20px"><button class="btn btn-primary" data-action="show-full" data-step="${n}">SHOW FULL DETAIL</button></div></div>`;
  }else{
    const canonical=SOURCE.steps[n]
      ? `<div class="source-label">Canonical playbook · verbatim Step ${n}</div><div class="canonical">${markdownToHtml(SOURCE.steps[n])}</div>`
      : `<div class="warning-card">${esc(SOURCE.error||'Canonical step content is still loading.')}</div>`;
    const interactive=n<=p.currentStep||state.done;
    body=`<div class="sheet-grid"><div>${canonical}
      <div class="fieldblock"><h4>Guided prompt</h4><div class="prompt-block"><div class="ph"><span class="t">APP-AUTHORED · FILLED FROM SETTINGS</span>
      <button class="btn btn-ghost small" data-action="copy-step-prompt" data-step="${n}">${ICONS.copy} COPY</button></div><pre>${esc(userPrompt(n))}</pre></div></div>
      ${checklistHtml(n,interactive)}</div><aside class="sheet-example">${renderExample(n)}</aside></div>`;
  }
  const sheet=$('#sheet');
  sheet.className=`sheet ${preview?'preview':'full'}`;
  sheet.setAttribute('aria-label',`${preview?'Preview':'Full detail'} — Step ${n}: ${STEP_META[n].title}`);
  sheet.innerHTML=`<button class="sheet-close" data-action="close-sheet" aria-label="Close">✕</button>
    <div class="step-head"><div class="stepno" style="color:${MODELS[modelForStep(n)].colour}">STEP ${n} · ${preview?'PREVIEW':'FULL DETAIL'}</div>
    <h2>${esc(STEP_META[n].title)}</h2></div>${body}`;
  $('#overlay').classList.add('on');
  $('#app').inert=true;
  document.body.style.overflow='hidden';
  $('[data-action="close-sheet"]',sheet)?.focus();
}

function openLegend(){
  lastFocus=document.activeElement;
  const sheet=$('#sheet');
  sheet.className='sheet';
  sheet.setAttribute('aria-label','Rule badge legend');
  sheet.innerHTML=`<button class="sheet-close" data-action="close-sheet" aria-label="Close">✕</button>
    <div class="step-head"><div class="stepno" style="color:var(--lime)">THE THREE KINDS OF RULE</div><h2>How seriously should I take this?</h2></div>
    ${legendHtml()}
    <div class="canonical">
      <div class="canonical-rule req"><strong>🛑 Production requirement</strong><br>Non-negotiable on real/client work. These protect data, secrets, users, and production.</div>
      <div class="canonical-rule default"><strong>✅ Recommended default</strong><br>A strong starting choice, not a law. Deviate when you have a reason.</div>
      <div class="canonical-rule habit"><strong>🎓 Personal habit / budget</strong><br>A learning or self-control rule for this player, not universal engineering truth.</div>
    </div>`;
  $('#overlay').classList.add('on');
  $('#app').inert=true;
  document.body.style.overflow='hidden';
  $('[data-action="close-sheet"]',sheet)?.focus();
}

function closeSheet(){
  $('#overlay').classList.remove('on');
  $('#sheet').innerHTML='';
  $('#app').inert=false;
  document.body.style.overflow='';
  if(lastFocus?.focus) lastFocus.focus();
  lastFocus=null;
}

function trapDialogFocus(event){
  if(event.key==='Escape' && $('#overlay').classList.contains('on')){
    event.preventDefault();closeSheet();return;
  }
  if(event.key!=='Tab'||!$('#overlay').classList.contains('on')) return;
  const focusable=$$('button:not([disabled]),a[href],input:not([disabled]),textarea:not([disabled]),select:not([disabled]),[tabindex]:not([tabindex="-1"])',$('#sheet')).filter(el=>!el.hidden);
  if(!focusable.length) return;
  const first=focusable[0],last=focusable[focusable.length-1];
  if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus();}
  else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus();}
}

function markTaskDone(n,id){
  stepState(n).tasks[id]=true;
  saveStore();render();
  toast('Task complete. The next small action is ready.');
}

function toggleTask(n,id){
  stepState(n).tasks[id]=!stepState(n).tasks[id];
  saveStore();
}

function toggleGate(n,id){
  stepState(n).gates[id]=!stepState(n).gates[id];
  saveStore();
}

function celebrate(message,projectFinish=false){
  toast(message);
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const burst=document.createElement('div');
  burst.className='celebration';
  burst.setAttribute('aria-hidden','true');
  const colours=['#c7f36b','#7ee9ff','#ff7ac0','#ffc800','#b478ff'];
  burst.innerHTML=Array.from({length:projectFinish?18:10},(_,index)=>
    `<i style="--x:${(index%6-2.5)*38}px;--y:${-45-(index%4)*25}px;--c:${colours[index%colours.length]};--d:${index*25}ms"></i>`
  ).join('');
  document.body.appendChild(burst);
  setTimeout(()=>burst.remove(),1300);
}

function completeStep(n){
  if(!allTasksDone(n)||!allGatesDone(n)) return;
  const p=project();
  stepState(n).done=true;
  if(n===9){
    p.finished=true;p.currentStep=10;p.view='home';
    saveStore();render();scrollToStart();celebrate('Project journey complete — maintenance mode is ready.',true);
    return;
  }
  p.currentStep=Math.min(10,n+1);
  p.view='home';
  saveStore();render();scrollToStart();
  celebrate(`Step ${n} complete. Step ${p.currentStep} is ready.`);
}

function stuckPrompt(){
  const p=project(),n=p.currentStep,task=currentTask(n);
  const current=task?.text || STEP_GATES[n].map(gate=>gate.text).join(' · ') || STEP_TASKS[n][0].text;
  return `I am following The Visual Playbook for ${p.name}. Step ${n}: ${STEP_META[n].title}. Current task or gate: ${current} Expected model / effort / mode: ${MODELS[modelForStep(n)].name} / ${STEP_META[n].effort} / ${STEP_META[n].mode}. What is happening instead: [describe the exact result, error, or visual difference]. Help me diagnose whether this is a specification, context, visual, logic/debugging, architectural, or environment/integration failure. Then give me one small next action and wait.`;
}

function notesMarkdown(){
  const p=project();
  const sections=STEP_META.map(meta=>{
    const note=stepState(meta.n).note.trim();
    return note?`## Step ${meta.n} — ${meta.title}\n\n${note}`:'';
  }).filter(Boolean);
  return `# ${p.name} — Walkthrough notes\n\nExported ${new Date().toLocaleString()}\n\n${sections.length?sections.join('\n\n'):'No notes yet.'}\n`;
}

function startSession(){
  const p=project();
  if(p.frontier.active||p.frontier.remaining<1) return;
  const ok=window.confirm('Start a frontier-model session for this step? This will spend 1 personal frontier credit.');
  if(!ok) return;
  p.frontier.remaining--;
  p.frontier.active={id:uid(),step:p.currentStep,startedAt:Date.now(),elapsedMs:0,running:true};
  saveStore();render();toast('Frontier session started. One personal credit was spent.');
}

function pauseSession(){
  const session=project().frontier.active;
  if(!session?.running) return;
  session.elapsedMs=sessionElapsed(session);session.startedAt=null;session.running=false;
  saveStore();render();toast('Session paused.');
}

function resumeSession(){
  const session=project().frontier.active;
  if(!session||session.running) return;
  session.startedAt=Date.now();session.running=true;
  saveStore();render();toast('Session resumed.');
}

function finishSession(){
  const p=project(),session=p.frontier.active;
  if(!session) return;
  session.elapsedMs=sessionElapsed(session);session.startedAt=null;session.running=false;session.finishedAt=new Date().toISOString();
  p.frontier.history.push(session);p.frontier.active=null;
  saveStore();render();toast(`Session saved at ${formatDuration(session.elapsedMs)}.`);
}

function updateTimerDisplay(){
  const session=project()?.frontier?.active;
  $$('[data-timer-display]').forEach(el=>{el.textContent=formatDuration(sessionElapsed(session));});
}

function setFrontierTotal(value){
  const p=project(),next=Math.max(0,Math.min(20,Number(value)||0));
  const spent=p.frontier.history.length+(p.frontier.active?1:0);
  p.settings.frontierCredits=next;p.frontier.total=next;p.frontier.remaining=Math.max(0,next-spent);
  saveStore();render();
}

function openProjectSetup(options={}){
  const editing=!!options.editing;
  const first=!!options.first;
  const existing=editing?project():null;
  const values={
    name:existing?.name||'',idea:existing?.vars.idea||'',audience:existing?.vars.audience||'',
    feeling:existing?.vars.feeling||'',sections:existing?.vars.sections||''
  };
  $('#app').classList.remove('on');
  const setup=$('#setupView');
  setup.style.display='block';
  setup.innerHTML=`<div class="setup-wrap"><form class="setup-card" id="v2SetupForm">
    <div class="view-kicker">${first?'New project':editing?'Project variables':'New project'}</div><h1>${first?'Start the walkthrough':editing?'Edit the project brief':'Start the walkthrough'}</h1>
    <div class="sub">These values fill guided prompts. You can change them later without losing progress.</div>
    <div class="field"><label for="setup-name">PROJECT NAME</label><input id="setup-name" name="name" value="${esc(values.name)}" placeholder="My project" required></div>
    <div class="field"><label for="setup-idea">SITE IDEA</label><textarea id="setup-idea" name="idea" placeholder="What are you building?" required>${esc(values.idea)}</textarea></div>
    <div class="field"><label for="setup-audience">AUDIENCE</label><input id="setup-audience" name="audience" value="${esc(values.audience)}" placeholder="Who is it for?" required></div>
    <div class="field"><label for="setup-feeling">ONE FEELING</label><input id="setup-feeling" name="feeling" value="${esc(values.feeling)}" placeholder="e.g. calm confidence" required></div>
    <div class="field"><label for="setup-sections">PAGES AND SECTIONS</label><textarea id="setup-sections" name="sections" placeholder="hero, catalog, about, contact…" required>${esc(values.sections)}</textarea></div>
    <div class="hero-actions"><button class="btn btn-primary" type="submit">${first?'CREATE PROJECT':editing?'SAVE CHANGES':'CREATE PROJECT'}</button>
    ${!first&&(editing||STORE.projects.length)?'<button class="btn btn-ghost" type="button" data-action="setup-cancel">CANCEL</button>':''}</div></form></div>`;
  $('#v2SetupForm').addEventListener('submit',event=>{
    event.preventDefault();
    const form=new FormData(event.currentTarget);
    if(editing){
      const p=project();p.name=String(form.get('name')).trim();
      p.vars={idea:String(form.get('idea')).trim(),audience:String(form.get('audience')).trim(),feeling:String(form.get('feeling')).trim(),sections:String(form.get('sections')).trim()};
      p.setupDone=true;p.view=first?'home':'settings';
    }else{
      const created=newProject(String(form.get('name')).trim(),{
        idea:String(form.get('idea')).trim(),audience:String(form.get('audience')).trim(),
        feeling:String(form.get('feeling')).trim(),sections:String(form.get('sections')).trim()
      });
      created.setupDone=true;
      STORE.projects.push(created);STORE.activeProjectId=created.id;
    }
    saveStore();setup.innerHTML='';setup.style.display='none';render();scrollToStart();
  });
  scrollToStart();
  $('#setup-name')?.focus();
}

function renameProject(id){
  const item=STORE.projects.find(p=>p.id===id);if(!item)return;
  const next=window.prompt('Rename this project:',item.name);
  if(next?.trim()){item.name=next.trim();saveStore();render();}
}

function deleteProject(id){
  const item=STORE.projects.find(p=>p.id===id);
  if(!item||STORE.projects.length===1) return;
  const ok=window.confirm(`Delete “${item.name}” and its local progress? Exported notes will not be affected.`);
  if(!ok) return;
  STORE.projects=STORE.projects.filter(p=>p.id!==id);
  if(STORE.activeProjectId===id) STORE.activeProjectId=STORE.projects[0].id;
  saveStore();render();toast('Project deleted from this browser.');
}

function saveProjectFields(){
  const p=project();
  const fields={};
  $$('[data-project-field]').forEach(input=>{fields[input.dataset.projectField]=input.value.trim();});
  if(fields.name) p.name=fields.name;
  ['idea','audience','feeling','sections'].forEach(key=>{p.vars[key]=fields[key]||'';});
  saveStore();render();toast('Project variables saved. Guided prompts are updated.');
}

function handleClick(event){
  const target=event.target.closest('[data-action],[data-nav]');
  if(!target) return;
  if(target.dataset.nav){
    const p=project();p.view=target.dataset.nav;saveStore();render();scrollToStart();return;
  }
  const action=target.dataset.action;
  if(action==='legend'){openLegend();return;}
  if(action==='close-sheet'){closeSheet();return;}
  if(action==='show-full'){openStep(Number(target.dataset.step),true);return;}
  if(action==='open-step'){exampleTab='result';openStep(Number(target.dataset.step));return;}
  if(action==='copy-current'){copyText(userPrompt(project().currentStep));return;}
  if(action==='copy-step-prompt'){copyText(userPrompt(Number(target.dataset.step)));return;}
  if(action==='copy-example'){
    const n=Number(target.dataset.step),example=EXAMPLES[n];
    copyText(exampleTab==='prompt'?example.prompt:example.result,'FORMA-9 artifact copied.');return;
  }
  if(action==='example-tab'){
    exampleTab=target.dataset.tab;
    const n=Number(target.dataset.step);
    if(target.closest('#sheet')) openStep(n,true); else render();
    return;
  }
  if(action==='task-done'){
    const task=currentTask();if(task)markTaskDone(project().currentStep,task.id);return;
  }
  if(action==='toggle-gate'){
    toggleGate(Number(target.dataset.step),target.dataset.id);render();return;
  }
  if(action==='complete-step'){completeStep(project().currentStep);return;}
  if(action==='stuck'){copyText(stuckPrompt(),'Diagnosis prompt copied — add the exact result or error.');return;}
  if(action==='sheet-task'){
    const n=Number(target.dataset.step);toggleTask(n,target.dataset.id);saveStore();render();openStep(n,true);return;
  }
  if(action==='sheet-gate'){
    const n=Number(target.dataset.step);toggleGate(n,target.dataset.id);saveStore();render();openStep(n,true);return;
  }
  if(action==='reference-toggle'){
    const acc=target.closest('.acc');const open=acc.classList.toggle('open');
    target.setAttribute('aria-expanded',String(open));return;
  }
  if(action==='session-start'){startSession();return;}
  if(action==='session-pause'){pauseSession();return;}
  if(action==='session-resume'){resumeSession();return;}
  if(action==='session-finish'){finishSession();return;}
  if(action==='export-notes'){
    downloadText(`${project().name.toLowerCase().replace(/[^a-z0-9]+/g,'-')||'project'}-walkthrough-notes.md`,notesMarkdown());
    toast('Notes exported as Markdown.');return;
  }
  if(action==='project-open'){
    STORE.activeProjectId=target.dataset.id;project().view='home';saveStore();render();scrollToStart();return;
  }
  if(action==='project-create'){openProjectSetup({editing:false});return;}
  if(action==='project-rename'){renameProject(target.dataset.id);return;}
  if(action==='project-delete'){deleteProject(target.dataset.id);return;}
  if(action==='save-project-fields'){saveProjectFields();return;}
  if(action==='setup-cancel'){
    $('#setupView').innerHTML='';$('#setupView').style.display='none';$('#app').classList.add('on');render();scrollToStart();return;
  }
}

function handleChange(event){
  const input=event.target,p=project();
  if(input.matches('[data-tool]')){
    p.settings.tools[input.dataset.tool]=input.checked;
    STORE.defaults.tools[input.dataset.tool]=input.checked;
    saveStore();render();return;
  }
  if(input.matches('[data-setting]')){
    const key=input.dataset.setting;
    if(key==='frontierCredits'){setFrontierTotal(input.value);return;}
    p.settings[key]=input.value;
    if(key==='defaultModel') STORE.defaults.defaultModel=input.value;
    saveStore();render();
  }
}

function handleInput(event){
  const input=event.target;
  if(input.matches('[data-note-step]')){
    stepState(Number(input.dataset.noteStep)).note=input.value;
    saveStore();
  }
}

async function boot(){
  STORE=loadStore();
  document.addEventListener('click',handleClick);
  document.addEventListener('change',handleChange);
  document.addEventListener('input',handleInput);
  document.addEventListener('keydown',trapDialogFocus);
  $('#overlay').addEventListener('click',event=>{if(event.target.id==='overlay')closeSheet();});
  timerTick=setInterval(updateTimerDisplay,1000);
  loadSource().then(()=>{
    if($('#app').classList.contains('on')) render();
  });
  if(!project().setupDone) openProjectSetup({editing:true,first:true});
  else render();
}

boot();
})();
</script>
</body>
</html>
