<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#131F24">
<title>The Walkthrough</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='42' fill='%23B7E219'/%3E%3Ccircle cx='50' cy='50' r='16' fill='%23131F24'/%3E%3C/svg%3E">
<style>
/* ============ tokens ============ */
:root{
  --bg:#131F24;
  --bg-deep:#0C1519;
  --panel:#1B2A32;
  --panel-2:#202F38;
  --border:#33444E;
  --border-soft:#28373F;
  --text:#F1F7FB;
  --muted:#8FA3AD;
  --faint:#8A9EA8;
  --lime:#B7E219;
  --lime-deep:#8FB405;
  --green:#58CC02;
  --green-deep:#46A302;
  --blue:#49B6FF;      /* Sonnet 5 */
  --purple:#B478FF;    /* Opus 4.8 */
  --coral:#FF6F61;     /* Fable 5 */
  --teal:#2EDACD;      /* Kimi K3 */
  --pink:#FF7AC0;      /* Codex GPT-5.6 Sol */
  --amber:#FFC800;     /* Gemini / Antigravity */
  --grey:#9AA9B2;      /* You / no model */
  --r-lg:24px;
  --r-md:16px;
  --r-sm:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.55;min-height:100vh;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea{font:inherit;color:var(--text)}
::selection{background:rgba(183,226,25,.3)}
a{color:var(--blue)}

/* ============ layout shell ============ */
#app{display:none}
#app.on{display:block}
.shell{display:grid;grid-template-columns:250px minmax(0,1fr) 340px;gap:0;max-width:1400px;margin:0 auto;min-height:100vh}
.sidebar{
  border-right:2px solid var(--border-soft);padding:24px 16px;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;gap:6px;
}
.brand{font-size:1.35rem;font-weight:800;color:var(--lime);letter-spacing:-.02em;padding:8px 12px 20px}
.brand small{display:block;font-size:.68rem;font-weight:700;color:var(--faint);letter-spacing:.14em;margin-top:2px}
.nav-item{
  display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:var(--r-sm);
  font-weight:800;font-size:.82rem;letter-spacing:.1em;color:var(--muted);
  border:2px solid transparent;text-align:left;width:100%;transition:background .15s,color .15s;
}
.nav-item svg{width:26px;height:26px;flex:none}
.nav-item:hover{background:var(--panel)}
.nav-item.active{color:var(--blue);background:rgba(73,182,255,.12);border-color:rgba(73,182,255,.45)}
.sidebar .spacer{flex:1}
.side-coins{padding:10px 14px;display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.8rem;font-weight:700;letter-spacing:.06em}

/* topbar (mobile) */
.topbar{display:none;align-items:center;justify-content:space-between;padding:12px 16px;position:sticky;top:0;background:rgba(19,31,36,.92);backdrop-filter:blur(8px);z-index:30;border-bottom:2px solid var(--border-soft)}
.topbar .brand{padding:0;font-size:1.05rem}
.topstats{display:flex;align-items:center;gap:14px}

/* bottom nav (mobile) */
.bottomnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--bg-deep);border-top:2px solid var(--border-soft);padding:6px 8px calc(6px + env(safe-area-inset-bottom));justify-content:space-around}
.bottomnav .nav-item{flex-direction:column;gap:3px;font-size:.58rem;letter-spacing:.08em;padding:7px 10px;align-items:center}
.bottomnav .nav-item svg{width:24px;height:24px}

.main{padding:28px 32px 120px;min-width:0}
.rail{padding:28px 24px 120px;display:flex;flex-direction:column;gap:18px;position:sticky;top:0;height:100vh;overflow-y:auto}

/* ============ cards & buttons ============ */
.card{background:var(--panel);border:2px solid var(--border);border-radius:var(--r-lg);padding:20px}
.card h3{font-size:.78rem;letter-spacing:.14em;color:var(--muted);font-weight:800;margin-bottom:14px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-weight:800;letter-spacing:.08em;font-size:.85rem;text-transform:uppercase;
  border-radius:14px;padding:13px 22px;transition:transform .08s, filter .15s;user-select:none;
}
.btn:active{transform:translateY(3px)}
.btn-primary{background:var(--lime);color:#131F24;box-shadow:0 4px 0 var(--lime-deep)}
.btn-primary:active{box-shadow:0 1px 0 var(--lime-deep)}
.btn-green{background:var(--green);color:#fff;box-shadow:0 4px 0 var(--green-deep)}
.btn-green:active{box-shadow:0 1px 0 var(--green-deep)}
.btn-ghost{background:var(--panel-2);border:2px solid var(--border);box-shadow:0 4px 0 var(--border-soft);color:var(--text)}
.btn-ghost:active{box-shadow:0 1px 0 var(--border-soft)}
.btn[disabled]{opacity:.4;cursor:not-allowed;transform:none!important}
.btn.small{padding:9px 14px;font-size:.72rem;border-radius:11px}

/* ============ progress banner (ref 1 black pill) ============ */
.progress-pill{
  background:#0B1114;border-radius:var(--r-lg);padding:18px 22px;margin-bottom:22px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;border:2px solid #060a0c;
}
.progress-pill .msg{font-weight:800;font-size:1.05rem}
.progress-pill .sub{color:var(--faint);font-size:.78rem;font-weight:700;letter-spacing:.06em;margin-top:2px}
.ring{position:relative;width:62px;height:62px;flex:none}
.ring .disc{width:100%;height:100%;border-radius:50%;background:conic-gradient(var(--lime) calc(var(--pct)*1%), #2A363B 0)}
.ring .hole{position:absolute;inset:7px;border-radius:50%;background:#0B1114;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem}

/* ============ hero ============ */
.hero{background:var(--panel);border:2px solid var(--border);border-radius:var(--r-lg);padding:26px;margin-bottom:34px}
.hero .eyebrow{color:var(--lime);font-weight:800;font-size:.72rem;letter-spacing:.18em;margin-bottom:6px}
.hero h1{font-size:1.55rem;font-weight:800;letter-spacing:-.01em;margin-bottom:14px}
.badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.badge{
  display:inline-flex;align-items:center;gap:7px;font-size:.7rem;font-weight:800;letter-spacing:.1em;
  padding:6px 12px;border-radius:999px;border:2px solid var(--border);color:var(--muted);background:var(--panel-2);
}
.badge .dot{width:9px;height:9px;border-radius:50%;background:currentColor}
.badge.model{border-color:currentColor;background:transparent}
.task-count{color:var(--faint);font-size:.74rem;font-weight:700;letter-spacing:.08em;margin-bottom:8px}
.task-text{font-size:1.16rem;line-height:1.6;margin-bottom:22px}
.task-text code, .field-body code, .refbody code{background:var(--bg-deep);border:1px solid var(--border-soft);border-radius:6px;padding:1px 6px;font-size:.9em}
.hero-actions{display:flex;flex-wrap:wrap;gap:10px}
.gate-note{color:var(--muted);font-size:.9rem;margin-bottom:14px}

/* checklist rows (ref 1) */
.check-row{
  display:flex;align-items:flex-start;gap:14px;background:var(--panel-2);border:2px solid var(--border-soft);
  border-radius:var(--r-md);padding:14px 16px;margin-bottom:10px;width:100%;text-align:left;transition:border-color .15s;
}
.check-row:hover{border-color:var(--border)}
.check-row .tick{
  width:26px;height:26px;border-radius:50%;border:2px solid var(--faint);flex:none;margin-top:2px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.check-row.done .tick{background:var(--lime);border-color:var(--lime);color:#131F24}
.check-row.done .tick svg{display:block}
.check-row .tick svg{display:none;width:14px;height:14px}
.check-row .lbl{flex:1;font-size:.95rem}
.check-row.done .lbl{color:var(--muted)}
.check-row .done-tag{color:var(--green);font-size:.74rem;font-weight:800;margin-left:8px;flex:none}

/* ============ the map path ============ */
.path{max-width:620px;margin:0 auto}
.unit-divider{display:flex;align-items:center;gap:14px;color:var(--faint);font-weight:800;font-size:.82rem;letter-spacing:.04em;margin:30px 0 22px}
.unit-divider::before,.unit-divider::after{content:"";flex:1;height:2px;background:var(--border-soft)}
.node-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:6px;position:relative;padding-top:52px;transform:translateX(var(--off,0))}
.node{
  width:74px;height:74px;border-radius:50%;position:relative;flex:none;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.35rem;
  color:#0d181d;box-shadow:0 6px 0 rgba(0,0,0,.45);transition:transform .1s;
}
.node:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.45)}
.node.future{opacity:.38}
.node.current{outline:6px solid rgba(255,255,255,.14);outline-offset:5px}
.node svg{width:30px;height:30px}
.node-label{margin-top:12px;font-weight:800;font-size:.86rem;color:var(--muted);text-align:center;max-width:230px}
.node-label small{display:block;color:var(--faint);font-weight:700;font-size:.66rem;letter-spacing:.12em;margin-bottom:1px}
.bubble{
  position:absolute;top:2px;left:50%;transform:translateX(-50%);z-index:5;white-space:nowrap;
  background:var(--bg-deep);border:2px solid var(--border);border-radius:12px;padding:7px 14px;
  color:var(--lime);font-weight:800;font-size:.72rem;letter-spacing:.14em;
  animation:bob 1.6s ease-in-out infinite;
}
.bubble::after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%) rotate(45deg);width:11px;height:11px;background:var(--bg-deep);border-right:2px solid var(--border);border-bottom:2px solid var(--border)}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}

/* ============ rail widgets ============ */
.ladder-rung{
  display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--r-sm);
  border:2px solid var(--border-soft);margin-bottom:8px;width:100%;text-align:left;transition:all .15s;
}
.ladder-rung .swatch{width:14px;height:14px;border-radius:50%;flex:none}
.ladder-rung .nm{font-weight:800;font-size:.88rem}
.ladder-rung .role{color:var(--faint);font-size:.72rem;font-weight:600}
.ladder-rung.on{background:var(--panel-2)}
.ladder-arrow{color:var(--faint);font-size:.74rem;font-weight:700;text-align:center;margin:6px 0 12px}
.strikes{display:flex;gap:6px;align-items:center;margin:10px 0 12px}
.strike-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--faint)}
.strike-dot.hit{background:var(--coral);border-color:var(--coral)}
.strikes .cap{color:var(--faint);font-size:.72rem;font-weight:700;margin-left:6px;letter-spacing:.06em}
.ladder-msg{background:var(--bg-deep);border:2px solid var(--border-soft);border-radius:var(--r-sm);padding:12px 14px;font-size:.86rem;color:var(--text);margin-bottom:12px;display:none}
.ladder-msg.on{display:block}
.ladder-actions{display:flex;flex-direction:column;gap:8px}

.coins-row{display:flex;gap:14px;margin-bottom:12px}
.coin{
  width:52px;height:52px;border-radius:50%;flex:none;position:relative;
  background:radial-gradient(circle at 32% 30%, #ff9a8e, var(--coral) 62%, #c9483c);
  border:3px solid #c9483c;display:flex;align-items:center;justify-content:center;
  font-weight:800;color:#4d130e;font-size:.95rem;box-shadow:0 4px 0 rgba(0,0,0,.4);
  transition:all .5s;
}
.coin.spent{background:var(--panel-2);border-color:var(--border);color:var(--faint);box-shadow:none;transform:scale(.9)}
.coin.spending{animation:spendCoin .7s ease}
@keyframes spendCoin{0%{transform:rotateY(0) scale(1)}60%{transform:rotateY(540deg) scale(1.25)}100%{transform:rotateY(720deg) scale(.9)}}
.coin-cap{font-size:.8rem;color:var(--muted)}
.rail-links .chev-row{margin-bottom:8px}

/* chevron rows (ref 1 "more things to try") */
.chev-row{
  display:flex;align-items:center;gap:13px;width:100%;text-align:left;
  background:var(--panel-2);border:2px solid var(--border-soft);border-radius:var(--r-md);
  padding:13px 15px;font-weight:700;font-size:.9rem;transition:border-color .15s;
}
.chev-row:hover{border-color:var(--border)}
.chev-row .chev{margin-left:auto;color:var(--faint);flex:none}
.chev-row .ico{color:var(--muted);flex:none;display:flex}

/* ============ setup / variables screen ============ */
.setup-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:26px 16px}
.setup-card{width:100%;max-width:560px;background:var(--panel);border:2px solid var(--border);border-radius:var(--r-lg);padding:28px}
.setup-card h1{font-size:1.6rem;font-weight:800;margin-bottom:4px}
.setup-card .sub{color:var(--muted);font-size:.92rem;margin-bottom:22px}
.field{margin-bottom:16px}
.field label{display:block;font-weight:800;font-size:.74rem;letter-spacing:.1em;color:var(--muted);margin-bottom:7px;text-transform:uppercase}
.field input,.field textarea{
  width:100%;background:var(--bg-deep);border:2px solid var(--border);border-radius:var(--r-md);
  padding:13px 15px;font-size:.98rem;outline:none;transition:border-color .15s;resize:vertical;
}
.field input:focus,.field textarea:focus{border-color:var(--lime)}
.field textarea{min-height:84px}

/* ============ modal / sheets ============ */
.overlay{
  position:fixed;inset:0;background:rgba(7,12,15,.78);z-index:100;display:none;
  align-items:flex-end;justify-content:center;padding:0;
}
.overlay.on{display:flex}
.sheet{
  background:var(--bg);border:2px solid var(--border);border-bottom:none;border-radius:var(--r-lg) var(--r-lg) 0 0;
  width:100%;max-width:780px;max-height:92vh;overflow-y:auto;padding:26px 26px 60px;position:relative;
  animation:sheetUp .25s ease;
}
@keyframes sheetUp{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
.sheet-close{
  position:sticky;top:0;float:right;width:42px;height:42px;border-radius:12px;background:var(--panel);
  border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.1rem;z-index:5;
}
.step-head .stepno{font-weight:800;font-size:.72rem;letter-spacing:.16em;margin-bottom:4px}
.step-head h2{font-size:1.5rem;font-weight:800;margin-bottom:16px;padding-right:52px}
.fieldblock{margin-bottom:22px}
.fieldblock>h4{font-size:.72rem;font-weight:800;letter-spacing:.14em;color:var(--muted);margin-bottom:8px;text-transform:uppercase}
.field-body{font-size:.96rem}
.field-body p{margin-bottom:10px}
.field-body ul{margin:0 0 10px 20px}
.field-body li{margin-bottom:8px}
.note-block{background:rgba(255,111,97,.09);border:2px solid rgba(255,111,97,.35);border-radius:var(--r-md);padding:13px 16px;font-size:.93rem;margin-bottom:22px}
.prompt-block{background:var(--bg-deep);border:2px solid var(--border-soft);border-radius:var(--r-md);margin-bottom:12px;overflow:hidden}
.prompt-block .ph{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:2px solid var(--border-soft)}
.prompt-block .ph .t{font-size:.72rem;font-weight:800;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.prompt-block pre{
  padding:14px 16px;white-space:pre-wrap;word-break:break-word;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.86rem;line-height:1.6;color:#D7E4EA;
}
.prompt-block .filled{color:var(--lime)}
.prompt-block .blank{color:var(--amber)}

/* ============ reference view ============ */
.ref-title{font-size:1.5rem;font-weight:800;margin-bottom:6px}
.ref-sub{color:var(--muted);margin-bottom:22px;font-size:.95rem}
.acc{border:2px solid var(--border);border-radius:var(--r-md);margin-bottom:12px;background:var(--panel);overflow:hidden}
.acc-head{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:16px 18px;font-weight:800;font-size:1rem}
.acc-head .chev{margin-left:auto;color:var(--faint);transition:transform .2s}
.acc.open .acc-head .chev{transform:rotate(90deg)}
.acc-body{display:none;padding:4px 20px 20px;border-top:2px solid var(--border-soft)}
.acc.open .acc-body{display:block}
.refbody p{margin-bottom:12px;font-size:.95rem}
.refbody ul{margin:0 0 12px 20px}
.refbody li{margin-bottom:9px;font-size:.95rem}
.refbody h5{font-size:.98rem;font-weight:800;margin:16px 0 8px}
.tbl-wrap{overflow-x:auto;margin-bottom:12px;border:2px solid var(--border-soft);border-radius:var(--r-sm)}
table{border-collapse:collapse;width:100%;min-width:560px;font-size:.86rem}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border-soft);vertical-align:top}
th{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:var(--panel-2)}
tr:last-child td{border-bottom:none}
.mchip{display:inline-flex;align-items:center;gap:6px;font-weight:700;white-space:nowrap}
.mchip .dot{width:8px;height:8px;border-radius:50%;flex:none}

/* ============ finish ============ */
.finish{max-width:560px;margin:40px auto;text-align:center}
.finish .trophy{font-size:5rem;margin-bottom:10px;animation:bob2 2s ease-in-out infinite}
@keyframes bob2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.finish h1{font-size:1.8rem;font-weight:800;margin-bottom:8px}
.finish p{color:var(--muted);margin-bottom:22px}

/* ============ toast ============ */
#toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);z-index:200;opacity:0;
  background:var(--bg-deep);border:2px solid var(--border);border-radius:var(--r-md);padding:14px 20px;
  font-weight:700;font-size:.9rem;max-width:min(520px,90vw);text-align:center;pointer-events:none;
  transition:opacity .25s, transform .25s;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.warn{border-color:var(--coral);color:var(--coral)}

/* ============ responsive ============ */
@media (max-width:1120px){
  .shell{grid-template-columns:220px minmax(0,1fr)}
  .rail{display:none}
  .rail-inline{display:flex;flex-direction:column;gap:16px;margin-bottom:30px}
}
@media (min-width:1121px){.rail-inline{display:none}}
@media (max-width:760px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .topbar{display:flex}
  .bottomnav{display:flex}
  .main{padding:18px 16px 130px}
  .hero{padding:20px}
  .hero h1{font-size:1.3rem}
  .task-text{font-size:1.05rem}
  .node{width:66px;height:66px}
  .node-wrap{transform:translateX(calc(var(--off,0) * .5))}
  .sheet{padding:18px 16px 60px}
  .btn{padding:12px 16px;font-size:.78rem}
  #toast{bottom:calc(96px + env(safe-area-inset-bottom))}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}

/* =====================================================================
   V2 — premium field-guide layer
===================================================================== */
:root{
  --bg:#091217;
  --bg-deep:#050b0f;
  --panel:#12212a;
  --panel-2:#182b35;
  --border:#314852;
  --border-soft:#223740;
  --text:#f4f1e8;
  --muted:#a6b8c1;
  --faint:#78909b;
  --lime:#c7f36b;
  --lime-deep:#7da522;
  --focus:#ffd166;
}
body{
  background:
    radial-gradient(circle at 60% -20%,rgba(73,182,255,.11),transparent 34rem),
    radial-gradient(circle at 100% 60%,rgba(255,122,192,.06),transparent 30rem),
    var(--bg);
}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible,a:focus-visible{
  outline:3px solid var(--focus);
  outline-offset:3px;
}
.shell{grid-template-columns:232px minmax(0,1fr) 380px;max-width:1520px}
.sidebar{
  padding:26px 14px;background:rgba(5,11,15,.34);
  border-right:1px solid var(--border-soft);
}
.brand-v2{
  padding:8px 12px 24px;color:var(--text);font-size:1.16rem;font-weight:900;
  letter-spacing:-.035em;
}
.brand-v2 .mark{
  display:inline-grid;place-items:center;width:28px;height:28px;border-radius:9px;
  margin-right:8px;background:var(--lime);color:var(--bg-deep);font-size:.75rem;
  box-shadow:0 0 0 5px rgba(199,243,107,.08);
}
.brand-v2 small{
  display:block;margin:7px 0 0 38px;color:var(--faint);font-size:.61rem;
  letter-spacing:.15em;font-weight:800;
}
.nav-item{min-height:48px}
.nav-item.active{
  color:var(--text);background:rgba(244,241,232,.07);
  border-color:rgba(199,243,107,.28);
}
.nav-item.active svg{color:var(--lime)}
.main{padding:32px 34px 120px}

}

}

  content:"";position:absolute;width:240px;height:240px;border-radius:50%;
  right:-140px;top:-150px;border:1px solid rgba(199,243,107,.22);

}

.badge{border-width:1px;background:rgba(5,11,15,.48)}

.btn{border-radius:12px}
.btn-primary{background:var(--lime);box-shadow:0 4px 0 #77991e}
.btn-green{background:#e9eef0;color:#091217;box-shadow:0 4px 0 #8fa0a7}
.btn-danger{background:rgba(255,116,104,.12);border:1px solid rgba(255,116,104,.45);color:#ff9b92}
.card{
  border-width:1px;background:
    linear-gradient(145deg,rgba(255,255,255,.022),transparent 50%),

}
.check-row{border-width:1px}
.check-row.done{opacity:.82}

.path{max-width:720px}
.node{

}
.node.future{filter:saturate(.5)}
.node-label{max-width:290px}
.journey-card{
  display:grid;grid-template-columns:88px minmax(0,1fr);gap:16px;align-items:center;
  padding:16px;border:1px solid var(--border-soft);border-radius:18px;

}

  text-transform:uppercase;margin-bottom:3px;
}
.journey-card .title{display:block;font-weight:850;line-height:1.25}
.journey-card .summary{color:var(--muted);font-size:.8rem;margin-top:5px;line-height:1.45}

/* FORMA-9 example */
.example-card{
  position:relative;overflow:hidden;border:1px solid #31505d;border-radius:22px;
  background:#071015;box-shadow:0 26px 70px rgba(0,0,0,.25);
}
.example-label{
  display:flex;align-items:center;gap:7px;padding:11px 14px;
  color:#a7d8ff;background:#0c1b22;border-bottom:1px solid #223b46;
  font-size:.62rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
}
.example-label::before{
  content:"";width:7px;height:7px;border-radius:50%;background:#75e8ff;
  box-shadow:0 0 14px #75e8ff;
}

  position:relative;min-height:230px;overflow:hidden;background:
    radial-gradient(circle at 65% 35%,rgba(105,221,255,.34),transparent 18%),

}
.example-visual img{width:100%;height:100%;min-height:230px;object-fit:cover;display:block}
.example-visual::after{
  content:"FORMA—9";position:absolute;left:18px;bottom:16px;color:white;
  font-size:.72rem;font-weight:900;letter-spacing:.22em;text-shadow:0 2px 12px #000;
}
.molecule{
  position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;
}
.molecule .core{
  width:104px;height:104px;border-radius:50%;
  border:1px solid rgba(192,244,255,.9);
  background:radial-gradient(circle at 35% 30%,#f1fdff 0 4%,#65d7ef 8%,#213f59 28%,#0b1820 62%);
  box-shadow:inset -16px -16px 28px rgba(0,0,0,.65),0 0 60px rgba(91,219,255,.45);
  animation:formaFloat 7s ease-in-out infinite;
}
.molecule .orbit{
  position:absolute;width:190px;height:76px;border:1px solid rgba(127,229,255,.65);
  border-radius:50%;transform:rotate(-24deg);
}
.molecule .orbit::before,.molecule .orbit::after{
  content:"";position:absolute;width:15px;height:15px;border-radius:50%;
  background:#d7fbff;box-shadow:0 0 18px #6be2ff;
}
.molecule .orbit::before{left:15px;top:6px}
.molecule .orbit::after{right:20px;bottom:2px;background:#ad75ff;box-shadow:0 0 18px #a56cff}
@keyframes formaFloat{50%{transform:translateY(-9px) rotate(8deg)}}
.example-body{padding:17px}
.example-step{
  color:#7ee9ff;font-size:.63rem;font-weight:900;letter-spacing:.16em;

}

}
.example-tabs button.on{color:#091217;background:#7ee9ff;border-color:#7ee9ff}
.artifact{
  margin:0 17px 17px;padding:14px;border:1px solid #28414d;border-radius:13px;
  background:#071116;color:#d8e5e9;font-size:.76rem;line-height:1.55;
}
.artifact pre{

}
.artifact .artifact-title{
  color:#7ee9ff;font-size:.59rem;font-weight:900;letter-spacing:.13em;
  text-transform:uppercase;margin-bottom:8px;
}
.rail-tools{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tool-stat{
  padding:13px;border:1px solid var(--border-soft);border-radius:14px;background:var(--panel);
}
.tool-stat .n{font-size:1.1rem;font-weight:900;color:var(--text)}
.tool-stat .l{font-size:.62rem;color:var(--faint);font-weight:800;letter-spacing:.08em;text-transform:uppercase}

/* project shelf + settings */
.project-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.project-card{
  padding:21px;border:1px solid var(--border);border-radius:20px;background:var(--panel);
}
.project-card.current{border-color:rgba(199,243,107,.52)}
.project-card h2{font-size:1.16rem;margin-bottom:4px}
.project-card .project-meta{color:var(--muted);font-size:.78rem;margin-bottom:16px}
.project-card .project-actions{display:flex;flex-wrap:wrap;gap:8px}
.new-project{border-style:dashed;display:flex;flex-direction:column;justify-content:center;min-height:190px}
.settings-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.setting-card{padding:20px;border:1px solid var(--border);border-radius:18px;background:var(--panel)}
.setting-card h2{font-size:1rem;margin-bottom:6px}
.setting-card>p{color:var(--muted);font-size:.8rem;margin-bottom:15px}
.field select{
  width:100%;background:var(--bg-deep);border:1px solid var(--border);
  border-radius:var(--r-md);padding:13px 15px;color:var(--text);
}
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;gap:16px;

}
.toggle-row:last-child{border-bottom:0}
.toggle-row label{font-weight:780}
.toggle{
  appearance:none;width:44px;height:25px;border-radius:999px;background:#31414a;
  position:relative;cursor:pointer;transition:background .18s;
}
.toggle::after{
  content:"";position:absolute;width:19px;height:19px;border-radius:50%;
  left:3px;top:3px;background:white;transition:transform .18s;
}
.toggle:checked{background:var(--lime)}
.toggle:checked::after{transform:translateX(19px);background:#122018}
.budget-note{
  padding:13px;border-left:3px solid #f0b8ff;background:rgba(240,184,255,.06);
  color:var(--muted);font-size:.78rem;line-height:1.5;border-radius:0 10px 10px 0;
}

/* notes + sessions */
.work-tools{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(240px,.8fr);gap:16px;margin-top:18px}
.notes-card textarea{width:100%;min-height:128px}
.session-time{

}
.session-actions{display:flex;flex-wrap:wrap;gap:8px}
.credit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.credit-dot{
  width:24px;height:24px;border-radius:50%;display:grid;place-items:center;
  color:#23112a;background:linear-gradient(145deg,#f5c3ff,#c16ee0);
  font-size:.58rem;font-weight:900;box-shadow:0 3px 0 #744085;
}
.credit-dot.spent{background:#263740;color:#718690;box-shadow:none}

/* canonical markdown */
.canonical{
  color:#dce7ea;font-size:.94rem;line-height:1.7;
}
.canonical h2,.canonical h3,.canonical h4,.canonical h5{
  color:var(--text);line-height:1.2;letter-spacing:-.02em;margin:27px 0 12px;
}
.canonical h2{font-size:1.35rem}
.canonical h3{font-size:1.15rem}
.canonical h4{font-size:1.02rem}
.canonical p{margin:0 0 14px}
.canonical ul,.canonical ol{margin:0 0 16px 21px}
.canonical li{margin:7px 0;padding-left:3px}
.canonical pre{
  overflow:auto;padding:15px;border:1px solid var(--border-soft);border-radius:12px;
  background:#050b0f;color:#cce1e7;font-size:.8rem;line-height:1.55;
}
.canonical code{background:#050b0f;border:1px solid #203640;border-radius:5px;padding:1px 5px}
.canonical pre code{border:0;padding:0}
.canonical table{min-width:700px}
.canonical-rule{
  position:relative;padding:14px 15px 14px 18px;margin:0 0 12px;
  border:1px solid var(--border-soft);border-radius:14px;background:rgba(24,43,53,.52);
}
.canonical-rule.req{border-left:3px solid #ff8a80}
.canonical-rule.default{border-left:3px solid #a7d8ff}
.canonical-rule.habit{border-left:3px solid #f0b8ff}
.source-label{
  display:inline-flex;margin-bottom:13px;padding:6px 9px;border-radius:8px;
  background:#071116;color:#9fb4bc;font-size:.61rem;font-weight:900;letter-spacing:.11em;
  text-transform:uppercase;
}
.preview-card{padding:4px 4px 18px}
.preview-lead{font-size:1.08rem;color:var(--text);line-height:1.65;margin-bottom:18px}
.preview-note{
  display:flex;gap:10px;padding:13px 14px;border:1px solid var(--border-soft);
  border-radius:13px;background:var(--panel);color:var(--muted);font-size:.82rem;
}
.sheet.full{max-width:1040px}
.sheet-grid{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:24px;align-items:start}
.sheet-example{position:sticky;top:62px}
.empty-state{padding:40px 20px;text-align:center;color:var(--muted)}
.warning-card{
  padding:12px 14px;border:1px solid rgba(255,209,102,.38);
  border-radius:12px;background:rgba(255,209,102,.07);color:#f3ddb0;
  font-size:.82rem;margin-bottom:14px;
}
.celebration{
  position:fixed;left:50%;top:48%;width:1px;height:1px;z-index:260;pointer-events:none;
}
.celebration i{
  position:absolute;width:8px;height:14px;border-radius:3px;background:var(--c);
  animation:celebrateBurst 1.05s cubic-bezier(.2,.8,.2,1) var(--d) both;
}
@keyframes celebrateBurst{
  0%{transform:translate(0,0) rotate(0);opacity:0}
  12%{opacity:1}
  100%{transform:translate(var(--x),var(--y)) rotate(240deg);opacity:0}
}

@media (max-width:1180px){
  .shell{grid-template-columns:210px minmax(0,1fr)}
  .rail{display:none}
  .rail-inline{display:block;margin-top:18px}
  .rail-inline .example-card{max-width:620px}
}
@media (min-width:1181px){.rail-inline{display:none}}
@media (max-width:760px){
  .shell{grid-template-columns:1fr}
  .main{padding:20px 15px 116px}
  .topbar{background:rgba(5,11,15,.94)}
  .topbar .brand-v2{padding:0;font-size:.95rem}
  .bottomnav{padding-left:4px;padding-right:4px}
  .bottomnav .nav-item{padding:7px 5px;min-width:0}

  .view-head{display:block}
  .legend-button{margin-top:13px}
  .hero{padding:22px 18px}

  .sheet-grid{grid-template-columns:1fr}
  .sheet-example{position:static}
  .example-visual,.example-visual img{min-height:190px}
  .journey-card{grid-template-columns:66px minmax(0,1fr);padding:13px}
  .journey-orb{width:58px;height:58px}
  .rail-inline .rail-tools{margin-top:12px}
}
@media (max-width:420px){
  .hero-actions .btn{width:100%}
  .project-card .btn{flex:1}
  .view-head h1{font-size:1.65rem}

}

function modeTable(rows){
  let h='<div class="tbl-wrap"><table><thead><tr>';
  rows[0].forEach(c=>h+='<th>'+c+'</th>');
  h+='</tr></thead><tbody>';
  rows.slice(1).forEach(r=>{h+='<tr>';r.forEach(c=>h+='<td>'+c+'</td>');h+='</tr>';});
  return h+'</tbody></table></div>';
}

  '<p><strong>Rule 1 — Sonnet is home.</strong> Sonnet 5 is your everyday model. Every task starts with Sonnet on its normal setting. Using Opus or Fable is a short visit for a specific hard job; when the job is done, you come straight back to Sonnet.</p>'+
  '<p><strong>Rule 2 — Fable opens exactly twice per project.</strong> Fable 5 is your smartest and most expensive model, and its usage allowance runs out fast. In a whole project you open it exactly two times: Step 1 (writing the plan) and Step 5 (the big animations). Any other Fable use means you have slipped back into your old habit — the one that kept eating your usage.</p>'+
  '<p><strong>Rule 3 — Two strikes, then climb.</strong> A model gets two tries at any task. Between try one and try two, you improve your instructions: add the exact error message, add a screenshot, make the task smaller. If try two also fails, you move up one rung of the ladder. You never argue with a model for an hour.</p>'+
  '<p><strong>The safety net under all three rules:</strong> before giving any model a task, save your game (in Git this is called a <em>commit</em> — see the dictionary). If the model breaks something, do not ask it to fix its own mess. Load your save (<em>revert</em>) and give a smaller, clearer task instead.</p>'
},

  '<li><strong>Bottom rung: '+chip('sonnet')+' (blue) — home base.</strong> You start every task here. About 80% of all work never leaves this rung.</li>'+
  '<li><strong>Middle rung: '+chip('opus')+' (purple) — the heavy lifter.</strong> You climb here when Sonnet has failed twice, or when the job is big and careful by nature.</li>'+

    ['The moment any hard problem is solved', 'Back to '+chip('sonnet'),'Normal','Rule 1 — come home']
  ])+
  '<p><strong>How to actually change effort:</strong> in Claude Code, type <code>/model</code> to pick Sonnet, Opus, or Fable. If your version shows a thinking or effort option next to the model, that is the dial — normal for everyday, high when this guide says high. If you cannot find any dial, simply add the words <strong>“think hard about this”</strong> to your request — Claude Code treats that as the instruction to think longer. For Fable 5: it manages its own thinking depth, so never worry about its dial — your only job with Fable is keeping the task small.</p>'+
  '<p><strong>What effort is:</strong> thinking time before answering. More effort = smarter on genuinely hard problems, but slower, and it burns your usage allowance much faster. More effort does NOT fix vague instructions or an oversized task. Small clear task on normal beats giant task on maximum, every single time.</p>'
},
{ id:'modes', title:'The Modes — how much freedom the model gets while it works', body:
  '<p>Model answers “who.” Effort answers “how hard they think.” <strong>Mode answers “how much are you watching while they work?”</strong> Every coding tool has some version of the same three modes, whatever names it uses. The idea that makes all of this make sense: <strong>the yes-button was never your real safety.</strong> Your real safety is the branch you’re on, the commit behind you, and the pull-request review at the end. Mode only controls how closely you watch <em>during</em> the work.</p>'+
  '<p><strong>1. PLAN mode (look and think only).</strong> The model can read your project and think, but it physically cannot change a file or run anything. It produces a plan; nothing happens until you approve it.<br><strong>Use it whenever the decision is expensive</strong> — before the skeleton, before a wow animation, whenever “what exactly should we build?” hasn’t been agreed yet.<br><strong>Why:</strong> a wrong plan costs one conversation to fix; wrong code costs hours. Plan mode also makes it impossible for an eager model to “helpfully” start building before you’ve agreed — which is exactly how expensive Fable usage used to vanish.</p>'+
  '<p><strong>2. ASK-each-time (the normal, default mode).</strong> The model proposes every single file change and every command, and waits for your yes before doing it.<br><strong>Use it while you’re learning, and for delicate code.</strong><br><strong>Why:</strong> watching each change land is how you learn to read code — and on delicate work, you catch a wrong direction after one file instead of after ten.</p>'+
  '<p><strong>3. AUTO-accept edits.</strong> The model applies file changes by itself without asking each time. It still pauses to ask before bigger actions, like installing packages or running commands.<br><strong>Use it for mechanical, well-defined work on a branch</strong> — scaffolding, performance passes, writing tests.<br><strong>Why:</strong> clicking yes forty times on boilerplate teaches you nothing and protects you from nothing — the branch, the preview link, and CodeRabbit are doing the protecting. Auto-accept just removes friction where your attention adds no value.</p>'+
  '<p><strong>4. The banned mode: full auto / “skip permissions.”</strong> Some tools offer a mode where nothing is asked at all, commands included.<br><strong>Never use it, at any stage.</strong> One bad command can delete work or leak your API key, and the minutes it saves are never worth that. If a tool offers it, the answer is no.</p>'+
  '<h5>How to switch, per tool:</h5><ul>'+
  '<li><strong>Claude Code:</strong> press <strong>Shift+Tab</strong> to cycle between the modes — the current one is shown at the bottom of the panel. (Exact names vary a little by version; the three ideas above are always there.)</li>'+
  '<li><strong>Cursor (for K3):</strong> the chat panel has a mode picker. The ask-questions-only option is its plan mode. The agent option proposes edits as <strong>diffs</strong> — before/after views you accept or reject one at a time (that’s ask-each-time) — or can be set to apply them automatically (that’s auto-accept).</li>'+
  '<li><strong>Codex:</strong> when it offers approval levels, pick the review/suggest level for inspecting, and edits-on-a-branch for fixing. Never its full-auto level.</li>'+
  '<li><strong>Antigravity:</strong> always used report-only in this playbook, which is its read-only posture.</li></ul>'+
  '<p><strong>The whole section in one line:</strong> PLAN when deciding · ASK when learning or the code is delicate · AUTO when the work is mechanical and a branch + commit sit behind it · full auto never.</p>'
},

{ id:'dictionary', title:'Dictionary', body:
  '<ul>'+
  '<li><strong>Repository (repo)</strong> — the online home of one project’s code, on GitHub.</li>'+
  '<li><strong>Branch</strong> — a separate save file of the project where you experiment safely. <code>main</code> is the real version.</li>'+
  '<li><strong>Commit</strong> — a save point. Made constantly.</li>'+
  '<li><strong>Push</strong> — send your saves up to GitHub.</li>'+
  '<li><strong>Pull request (PR)</strong> — a proposal to add your branch’s changes into <code>main</code>. Shows every changed line. CodeRabbit comments on it; you press merge.</li>'+
  '<li><strong>Merge</strong> — accept a pull request. The change becomes real.</li>'+
  '<li><strong>Revert</strong> — load an earlier save point, throwing away a bad change.</li>'+
  '<li><strong>Terminal</strong> — the text window where you type commands. About ten commands cover everything.</li>'+
  '<li><strong>Claude Code</strong> — Claude living in the terminal; reads your project, edits files, runs commands. <code>/model</code> switches between Sonnet, Opus, Fable.</li>'+
  '<li><strong>API key</strong> — a password string that lets a tool bill your account. Goes in Cursor’s settings and nowhere else, ever.</li>'+
  '<li><strong>Dev server / localhost</strong> — your site running privately on your own computer while you build.</li>'+
  '<li><strong>Effort / thinking / reasoning</strong> — how long a model thinks before answering. See the Switching Guide.</li>'+
  '<li><strong>Mode</strong> — how much freedom a model has while it works: PLAN (look and think only, can’t touch files), ASK-each-time (proposes every change and waits for your yes), AUTO-accept (applies file edits itself, still asks before bigger actions like commands). Full guide with the whys: the Modes section.</li>'+
  '<li><strong>Diff</strong> — a before/after view of a proposed change, shown line by line. Cursor shows K3’s work as diffs for you to accept or reject.</li>'+
  '<li><strong>Full auto / “skip permissions”</strong> — the banned mode where a tool asks nothing at all, commands included. Never used, at any stage.</li>'+
  '<li><strong>Lighthouse</strong> — a free scoring robot for site speed. You want 90+ on mobile.</li>'+
  '<li><strong>Playwright</strong> — a robot that clicks through your site checking things work.</li>'+
  '<li><strong>axe</strong> — a robot that checks accessibility.</li>'+
  '<li><strong>Hydration error</strong> — a common Next.js bug where the page the server sent and the page the browser built disagree; Codex hunts these in Step 7.</li>'+
  '<li><strong>GSAP / Motion / React Three Fiber</strong> — the animation and 3D toolkits. The rule that matters: never both GSAP and Motion in the same component (it causes conflicts) — MOTION.md enforces it.</li>'+
  '</ul>'

/* =====================================================================
   STATE
===================================================================== */
const KEY = 'walkthrough-v1';
function defaultState(){
  const perStep = {};
  STEPS.forEach(s=>{perStep[s.n]={tasks:s.tasks.map(()=>false),gates:s.gates.map(()=>false),done:false};});
  return {
    version:1,
    vars:{name:'',idea:'',audience:'',feeling:'',sections:''},
    setupDone:false,
    currentStep:0,
    perStep:perStep,
    ladder:{rung:0,strikes:0},
    coins:2,
    coinSpent:{s1:false,s5:false},
    finished:false,
    liveUrl:'',
    view:'home'
  };
}
let S = load();
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return defaultState();
    const d = defaultState(), s = JSON.parse(raw);
    // merge saved state over defaults so older/partial saves survive additions
    const out = Object.assign({}, d, s);
    out.vars = Object.assign({}, d.vars, s.vars||{});
    out.ladder = Object.assign({}, d.ladder, s.ladder||{});
    out.coinSpent = Object.assign({}, d.coinSpent, s.coinSpent||{});
    out.perStep = {};
    STEPS.forEach(st=>{
      const def = d.perStep[st.n], got = (s.perStep||{})[st.n]||{};
      out.perStep[st.n] = {
        tasks: def.tasks.map((_,i)=>!!(got.tasks||[])[i]),
        gates: def.gates.map((_,i)=>!!(got.gates||[])[i]),
        done: !!got.done
      };
    });
    out.currentStep = Math.min(Math.max(+out.currentStep||0, 0), STEPS.length-1);
    return out;
  }catch(e){ return defaultState(); }
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }

/* =====================================================================
   HELPERS
===================================================================== */
const $ = sel => document.querySelector(sel);
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function plainText(html){
  return html.replace(/<[^>]+>/g,'')
    .replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
}
function sentence(t){ t = t.trim(); return /[.!?…”"']$/.test(t) ? t : t+'.'; }

const VAR_FILLS = () => ({
  '[describe it]': S.vars.idea,
  '[audience]': S.vars.audience,
  '[one feeling]': S.vars.feeling,
  '[rough list]': S.vars.sections
});
function fillPrompt(text, noFill){
  let out = text;
  if(!noFill){
    const fills = VAR_FILLS();
    for(const k in fills){ if(fills[k]) out = out.split(k).join(fills[k]); }
  }
  return out;
}
function promptHtml(text, noFill){
  // escape, substitute variables (lime), highlight remaining [blanks] (amber)
  let out = esc(text);
  if(!noFill){
    const fills = VAR_FILLS();
    for(const k in fills){
      if(fills[k]) out = out.split(esc(k)).join('<span class="filled">'+esc(fills[k])+'</span>');
    }
  }
  out = out.replace(/\[([^\]<]+)\]/g,'<span class="blank">[$1]</span>');
  return out;
}
function copyText(text, msg){
  const done = ()=> toast(msg || 'Copied — paste it in.');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>{fallbackCopy(text);done();});
  } else { fallbackCopy(text); done(); }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}
let toastTimer;
function toast(msg, warn){
  const t = $('#toast');
  t.textContent = msg; t.className = warn ? 'on warn' : 'on';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.className=''; }, 4200);
}

function step(n){ return STEPS[n]; }
function ps(n){ return S.perStep[n]; }
function stepModel(n){
  // base model, possibly overridden by ladder escalation on the current step
  if(n===S.currentStep && S.ladder.rung > baseRung(n)) return LADDER[S.ladder.rung];
  return step(n).badges.model;
}
function baseRung(n){
  const i = LADDER.indexOf(step(n).badges.model);
  return i>-1 ? i : 0;
}
function currentTaskIndex(n){
  const p = ps(n);
  for(let i=0;i<p.tasks.length;i++) if(!p.tasks[i]) return i;
  return -1; // all tasks done -> gate phase
}
function doneSteps(){
  let c=0; for(let i=0;i<=9;i++) if(ps(i).done) c++;
  return c;
}
function pct(){ return Math.round(doneSteps()/10*100); }
function bannerMsg(){
  const p = pct();
  if(p===0) return 'Let’s begin.';
  if(p<50) return 'On your way.';
  if(p<100) return 'More than halfway there!';
  return 'You shipped it!';
}
function stuckPrompt(){
  const n = S.currentStep, st = step(n);
  const ti = currentTaskIndex(n);
  const taskText = ti===-1 ? sentence('Finish the step’s gate checklist: '+st.gates.join('; '))
    : sentence(plainText(st.tasks[ti].t));
  const b = st.badges;
  const badges = MODELS[stepModel(n)].name+' / '+b.effort+' / '+b.mode;
  return "I'm following my website playbook. Step "+n+": "+st.name+". Current task: "+taskText+" Expected model / effort / mode: "+badges+". What's happening instead: [player describes here]. Guide me one small action at a time and wait for me between actions.";
}
function escalationPrompt(fromKey, toKey){
  const n = S.currentStep, st = step(n);
  const ti = currentTaskIndex(n);
  const taskText = ti===-1 ? sentence(st.gates.join('; ')) : sentence(plainText(st.tasks[ti].t));
  const who = fromKey==='you' ? 'I have' : MODELS[fromKey].name+' has';
  return 'You are '+MODELS[toKey].name+', taking over a task that '+who+' now tried twice without success. Step '+n+': '+st.name+'. The task, made smaller and clearer: '+taskText+' The exact error message: [paste the exact error message]. Screenshot: [attach a screenshot]. Start fresh — do not build on the previous attempt.';
}

/* =====================================================================
   RENDER — shell & nav
===================================================================== */
function renderNav(){
  const items = [
    ['home','You are here',I.home],['map','The map',I.map],['reference','Reference',I.book],['vars','Edit variables',I.gear]
  ];
  document.querySelectorAll('[data-nav]').forEach(btn=>{
    const key = btn.dataset.nav;
    const it = items.find(x=>x[0]===key);
    btn.innerHTML = it[2]+'<span>'+it[1].toUpperCase()+'</span>';
    btn.classList.toggle('active', S.view===key || (key==='map'&&S.view==='home'&&btn.dataset.scrolled==='1'));
  });
}
function coinHtml(size){
  const spent1 = S.coinSpent.s1, spent2 = S.coinSpent.s5;
  return '<div class="coin'+(spent1?' spent':'')+'" style="width:'+size+'px;height:'+size+'px" title="Fable coin — Step 1">F5</div>'+
         '<div class="coin'+(spent2?' spent':'')+'" style="width:'+size+'px;height:'+size+'px" title="Fable coin — Step 5">F5</div>';
}
function renderCoins(){
  $('#topCoins').innerHTML = coinHtml(30);
  $('#sideCoins').innerHTML = coinHtml(26)+'<span>FABLE COINS</span>';
}

/* =====================================================================
   RENDER — home (hero + path)
===================================================================== */
function badgeRow(n){
  const st = step(n);
  const mk = stepModel(n);
  const m = MODELS[mk];
  let h = '<div class="badges">';
  h += '<span class="badge model" style="color:'+m.colour+'"><span class="dot"></span>MODEL · '+m.name.toUpperCase()+'</span>';
  h += '<span class="badge">EFFORT · '+st.badges.effort+'</span>';
  h += '<span class="badge">MODE · '+st.badges.mode+'</span>';
  return h+'</div>';
}
function renderHero(){
  const n = S.currentStep, st = step(n), p = ps(n);
  const ti = currentTaskIndex(n);
  let inner = '<div class="eyebrow">YOU ARE HERE</div>'
    + '<h1>Step '+n+' — '+st.name+'</h1>'
    + badgeRow(n);

  if(S.finished && n===10){
    inner += '<div class="task-text">'+st.one+'</div>';
    if(st.extra) inner += '<div class="gate-note">'+st.extra+'</div>';
    inner += '<div class="hero-actions"><button class="btn btn-ghost" id="btnStuck">I’M STUCK</button></div>';
  } else if(ti>-1){
    const task = st.tasks[ti];
    inner += '<div class="task-count">TASK '+(ti+1)+' OF '+st.tasks.length+'</div>'
      + '<div class="task-text">'+task.t+'</div>'
      + '<div class="hero-actions">'
      + (task.copy ? '<button class="btn btn-primary" id="btnCopy">'+I.copy+' COPY THE PROMPT</button>' : '')
      + '<button class="btn btn-ghost" id="btnStuck">I’M STUCK</button>'
      + '<button class="btn btn-green" id="btnDone">DONE → NEXT</button>'
      + '</div>';
  } else {
    // gate phase
    inner += '<div class="gate-note"><strong>You are finished when:</strong> tick each gate honestly — the step can’t complete until they’re all ticked.</div>';
    st.gates.forEach((g,i)=>{
      inner += '<button class="check-row'+(p.gates[i]?' done':'')+'" data-gate="'+i+'" aria-pressed="'+!!p.gates[i]+'"><span class="tick">'+I.check+'</span><span class="lbl">'+g+'</span>'+(p.gates[i]?'<span class="done-tag">Done</span>':'')+'</button>';
    });
    const allGates = p.gates.every(Boolean);
    inner += '<div class="hero-actions" style="margin-top:12px">'
      + '<button class="btn btn-ghost" id="btnStuck">I’M STUCK</button>'
      + '<button class="btn btn-green" id="btnComplete" '+(allGates?'':'disabled')+'>COMPLETE STEP →</button>'
      + '</div>';
  }
  return '<section class="hero">'+inner+'</section>';
}
function renderBanner(){
  const p = pct();
  return '<div class="progress-pill"><div><div class="msg">'+bannerMsg()+'</div>'
    + '<div class="sub">STEP '+S.currentStep+' OF 11 · '+(S.vars.name?esc(S.vars.name).toUpperCase():'YOUR PROJECT')+'</div></div>'
    + '<div class="ring"><div class="disc" style="--pct:'+p+'"></div><div class="hole">'+p+'%</div></div></div>';
}
function renderPath(){
  const offsets = [0,-64,-32,42,64,32,0,-52,-70,-30,28];
  let h = '<div class="path" id="mapAnchor">';
  STEPS.forEach((st,i)=>{
    const m = MODELS[st.model];
    const p = ps(i);
    const isCur = i===S.currentStep && !(S.finished&&i<10);
    const cls = p.done?'':'future';
    h += '<div class="unit-divider">STEP '+i+' · '+st.name.toUpperCase()+'</div>';
    h += '<div class="node-wrap" style="--off:'+offsets[i]+'px">'
      + (isCur?'<div class="bubble">YOU ARE HERE</div>':'')
      + '<button class="node '+(isCur?'current':(p.done?'':'future'))+'" data-step="'+i+'" aria-label="Step '+i+': '+st.name+'" style="background:'+m.colour+'">'
      + (p.done?I.check:(''+i))
      + '</button>'
      + '<div class="node-label"><small style="color:'+m.colour+'">'+MODELS[st.model].name.toUpperCase()+'</small>'+st.one.split('—')[0].split('.')[0].slice(0,80)+'…</div>'
      + '</div>';
  });
  return h+'</div>';
}
function renderRailWidgets(){
  const n = S.currentStep;
  const activeRung = Math.max(S.ladder.rung, baseRung(n));
  let ladder = '<div class="card"><h3>THE LADDER</h3>';
  for(let i=LADDER.length-1;i>=0;i--){
    const k = LADDER[i], m = MODELS[k];
    ladder += '<button class="ladder-rung'+(i===activeRung?' on':'')+'" data-rung="'+i+'" style="'+(i===activeRung?'border-color:'+m.colour:'')+'">'
      + '<span class="swatch" style="background:'+m.colour+'"></span>'
      + '<span><span class="nm" style="color:'+m.colour+'">'+m.name+'</span><br><span class="role">'+LADDER_ROLE[k]+'</span></span>'
      + '</button>';
  }
  ladder += '<div class="ladder-arrow">↓ Solved? Go straight back to Sonnet.</div>';
  ladder += '<div class="strikes"><span class="strike-dot'+(S.ladder.strikes>0?' hit':'')+'"></span><span class="strike-dot'+(S.ladder.strikes>1?' hit':'')+'"></span><span class="cap">STRIKES ON THIS TASK</span></div>';
  ladder += '<div class="ladder-msg"></div>';
  ladder += '<div class="ladder-actions"><button class="btn btn-ghost small" data-act="fail">IT FAILED</button>'
    + '<button class="btn btn-ghost small" data-act="solve">SOLVED — BACK TO SONNET</button></div></div>';

  let coins = '<div class="card"><h3>FABLE COINS</h3><div class="coins-row">'+coinHtml(52)+'</div>'
    + '<div class="coin-cap">Fable opens exactly twice per project: Step 1 (writing the plan) and Step 5 (the big animations).</div></div>';

  let links = '<div class="card rail-links"><h3>REFERENCE</h3>';
  if(S.finished) links += '<button class="chev-row" data-act="finish"><span class="ico">🏆</span>The finish screen<span class="chev">'+I.chev+'</span></button>';
  REFERENCE.forEach(r=>{
    links += '<button class="chev-row" data-ref="'+r.id+'"><span class="ico">'+I.book+'</span>'+r.title+'<span class="chev">'+I.chev+'</span></button>';
  });
  links += '</div>';
  return ladder+coins+links;
}
function renderHome(){
  const railInline = '<div class="rail-inline">'+renderRailWidgets()+'</div>';
  $('#main').innerHTML = renderBanner()+renderHero()+railInline+renderPath();
  $('#rail').innerHTML = renderRailWidgets();
  bindHome();
}

   RENDER — reference view
===================================================================== */
function renderReference(openId){
  let h = '<div class="ref-title">Reference</div><div class="ref-sub">The rules of the whole system — all of it, always readable. Nothing is locked behind progress.</div>';

      + '<div class="acc-body"><div class="refbody">'+r.body+'</div></div></div>';

===================================================================== */
function renderFinish(){
  $('#main').innerHTML =
    '<div class="finish"><div class="trophy">🏆</div>'
    + '<h1>The site is live.</h1>'
    + '<p>Steps 0–9 complete, inside the full loop, every gate ticked with your own eyes. Paste the live URL so it’s saved here.</p>'
    + '<div class="field"><label>LIVE URL</label><input id="liveUrl" type="url" placeholder="https://…" value="'+esc(S.liveUrl||'')+'"></div>'

    + '<button class="btn btn-primary" id="btnNext">START NEXT PROJECT</button>'
    + '<button class="btn btn-ghost" id="btnStay">KEEP EXPLORING → STEP 10</button></div></div>';
  $('#rail').innerHTML = renderRailWidgets();
  bindRail();
  $('#liveUrl').addEventListener('change',e=>{S.liveUrl=e.target.value;save();});
  $('#btnNext').addEventListener('click',()=>{
    // reset task state; keep the variables editable (Step 0 is one-time — next project starts at Step 1)
    const vars = S.vars, url = S.liveUrl;
    S = defaultState();
    S.vars = vars; S.setupDone = true;
    S.perStep[0].done = true;
    S.perStep[0].tasks = S.perStep[0].tasks.map(()=>true);
    S.perStep[0].gates = S.perStep[0].gates.map(()=>true);
    S.currentStep = 1;
    save();
    openSetup(true);
  });
  $('#btnStay').addEventListener('click',()=>{ S.view='home'; save(); render(); });
}

/* =====================================================================
   RENDER — step card modal
===================================================================== */
let lastFocus = null;
function openStepCard(n, focusSel){
  const st = step(n), p = ps(n), mk = st.badges.model, m = MODELS[mk];
  const freshOpen = !$('#overlay').classList.contains('on');
  if(freshOpen) lastFocus = document.activeElement;
  let h = '<button class="sheet-close" id="sheetClose" aria-label="Close">✕</button>';
  h += '<div class="step-head"><div class="stepno" style="color:'+MODELS[st.model].colour+'">STEP '+n+'</div><h2>'+st.name+'</h2></div>';
  h += '<div class="fieldblock"><h4>In one sentence</h4><div class="field-body">'+st.one+'</div></div>';
  if(st.why) h += '<div class="fieldblock"><h4>Why this step exists</h4><div class="field-body">'+st.why+'</div></div>';
  if(st.note) h += '<div class="note-block">'+st.note+'</div>';
  h += '<div class="fieldblock"><h4>Who does it</h4>'+badgeRowStatic(st)+'<div class="field-body">'+st.who+'</div></div>';
  if(st.tasks.length){
    h += '<div class="fieldblock"><h4>'+(st.tasksTitle||'Do this')+'</h4>';
    st.tasks.forEach((t,i)=>{
      h += '<button class="check-row'+(p.tasks[i]?' done':'')+'" data-mtask="'+i+'" aria-pressed="'+!!p.tasks[i]+'"><span class="tick">'+I.check+'</span><span class="lbl">'+t.t+'</span>'+(p.tasks[i]?'<span class="done-tag">Done</span>':'')+'</button>';
    });
    h += '</div>';
  }
  if(st.prompts.length){
    h += '<div class="fieldblock"><h4>Copy-paste prompts</h4>';
    st.prompts.forEach(pr=>{
      h += '<div class="prompt-block"><div class="ph"><span class="t">'+pr.label+'</span>'
        + '<button class="btn btn-ghost small" data-pcopy="'+pr.id+'">'+I.copy+' COPY</button></div>'
        + '<pre>'+promptHtml(pr.text, pr.noFill)+'</pre></div>';
    });
    h += '</div>';
  }
  if(st.extra) h += '<div class="fieldblock"><div class="field-body">'+st.extra+'</div></div>';
  if(st.gates.length){
    h += '<div class="fieldblock"><h4>You are finished when</h4>';
    st.gates.forEach((g,i)=>{
      h += '<button class="check-row'+(p.gates[i]?' done':'')+'" data-mgate="'+i+'" aria-pressed="'+!!p.gates[i]+'"><span class="tick">'+I.check+'</span><span class="lbl">'+g+'</span>'+(p.gates[i]?'<span class="done-tag">Done</span>':'')+'</button>';
    });
    h += '</div>';
  }
  if(st.then) h += '<div class="fieldblock"><h4>Then</h4><div class="field-body">'+st.then+'</div></div>';
  if(st.wrong){
    h += '<div class="fieldblock"><h4>If it goes wrong</h4><div class="field-body"><ul>';
    st.wrong.forEach(w=>h+='<li>'+w+'</li>');
    h += '</ul></div></div>';
  }
  const sheet = $('#sheet');
  sheet.setAttribute('aria-label','Step '+n+' — '+st.name);
  sheet.innerHTML = h;
  $('#overlay').classList.add('on');
  document.body.style.overflow = 'hidden';
  const focusTarget = focusSel ? sheet.querySelector(focusSel) : null;
  (focusTarget || $('#sheetClose')).focus();
  $('#sheetClose').addEventListener('click', closeSheet);
  sheet.querySelectorAll('[data-pcopy]').forEach(b=>b.addEventListener('click',()=>{
    const pr = st.prompts.find(x=>x.id===b.dataset.pcopy);
    copyText(fillPrompt(pr.text, pr.noFill));
  }));
  sheet.querySelectorAll('[data-mtask]').forEach(b=>b.addEventListener('click',()=>{
    const i = +b.dataset.mtask;
    p.tasks[i] = !p.tasks[i]; save(); openStepCard(n, '[data-mtask="'+i+'"]'); render();
  }));
  sheet.querySelectorAll('[data-mgate]').forEach(b=>b.addEventListener('click',()=>{
    const i = +b.dataset.mgate;
    p.gates[i] = !p.gates[i]; save(); openStepCard(n, '[data-mgate="'+i+'"]'); render();
  }));
}
function badgeRowStatic(st){
  const m = MODELS[st.badges.model];
  return '<div class="badges">'
    + '<span class="badge model" style="color:'+m.colour+'"><span class="dot"></span>MODEL · '+m.name.toUpperCase()+'</span>'
    + '<span class="badge">EFFORT · '+st.badges.effort+'</span>'
    + '<span class="badge">MODE · '+st.badges.mode+'</span></div>';
}
function closeSheet(){
  $('#overlay').classList.remove('on');
  document.body.style.overflow = '';
  if(lastFocus && lastFocus.focus) lastFocus.focus();
  lastFocus = null;
}

/* =====================================================================
   SETUP / VARIABLES SCREEN
===================================================================== */
function openSetup(editMode){
  const v = S.vars;
  $('#app').classList.remove('on');

  '<div class="setup-wrap"><div class="setup-card">'
  + '<h1>'+(editMode?'Edit variables':'First setup')+'</h1>'
  + '<div class="sub">'+(editMode?'Change anything — every prompt in the app updates instantly.':'Answer once. Every prompt in the whole app auto-fills these into its brackets from then on.')+'</div>'
  + '<div class="field"><label>Project name</label><input id="v-name" value="'+esc(v.name)+'" placeholder="my-site"></div>'
  + '<div class="field"><label>Your site idea (a paragraph)</label><textarea id="v-idea" placeholder="What are you building?">'+esc(v.idea)+'</textarea></div>'
  + '<div class="field"><label>Who is it for?</label><input id="v-audience" value="'+esc(v.audience)+'" placeholder="The audience"></div>'
  + '<div class="field"><label>The one feeling a visitor should get</label><input id="v-feeling" value="'+esc(v.feeling)+'" placeholder="e.g. calm confidence"></div>'
  + '<div class="field"><label>Rough list of pages and sections</label><textarea id="v-sections" placeholder="hero, about, gallery, contact…">'+esc(v.sections)+'</textarea></div>'

  $('#setupGo').addEventListener('click',()=>{
    S.vars = {
      name:$('#v-name').value.trim(), idea:$('#v-idea').value.trim(),
      audience:$('#v-audience').value.trim(), feeling:$('#v-feeling').value.trim(),
      sections:$('#v-sections').value.trim()
    };
    S.setupDone = true; save();
    $('#setupView').style.display='none'; $('#setupView').innerHTML='';
    $('#app').classList.add('on');
    render();

  if(editMode) $('#setupCancel').addEventListener('click',()=>{
    $('#setupView').style.display='none'; $('#setupView').innerHTML='';
    $('#app').classList.add('on'); render();
  });
}

/* =====================================================================
   MECHANICS — ticking, gates, ladder, coins
===================================================================== */
function tickCurrentTask(){
  const n = S.currentStep;
  const ti = currentTaskIndex(n);
  if(ti===-1) return;
  ps(n).tasks[ti] = true;
  // a new task = a fresh two tries (strikes are per task)
  S.ladder = {rung:baseRung(n), strikes:0};
  ladderMsgText = '';
  save(); render();
}
function completeStep(){
  const n = S.currentStep, p = ps(n);
  if(!p.gates.every(Boolean)) return;
  p.done = true;
  // Fable coins: Steps 1 and 5 each spend one
  let coin = false;
  if(n===1 && !S.coinSpent.s1){ S.coinSpent.s1=true; S.coins--; coin=true; }
  if(n===5 && !S.coinSpent.s5){ S.coinSpent.s5=true; S.coins--; coin=true; }
  if(n===9){ S.finished = true; S.currentStep = 10; S.view = 'finish'; }
  else if(n<10){ S.currentStep = n+1; }
  S.ladder = {rung:baseRung(S.currentStep), strikes:0};
  ladderMsgText = '';
  save();
  render();
  // animate + announce on the freshly rendered DOM
  if(coin) spendAnim(n);
  else if(n!==9) toast('Step '+n+' complete. On to Step '+S.currentStep+' — '+step(S.currentStep).name+'.');
}
function spendAnim(n){
  const idx = n===1 ? 0 : 1;
  document.querySelectorAll('.coins-row, #topCoins, #sideCoins').forEach(row=>{
    const coins = row.querySelectorAll('.coin');
    if(coins[idx]) coins[idx].classList.add('spending');
  });
  toast('Step '+n+' complete — a Fable coin is spent, that’s one of its two openings. On to Step '+S.currentStep+' — '+step(S.currentStep).name+'.');
}
function ladderFail(){
  const n = S.currentStep;
  const rung = Math.max(S.ladder.rung, baseRung(n));
  S.ladder.rung = rung;
  S.ladder.strikes++;
  if(S.ladder.strikes===1){
    showLadderMsg('Improve the prompt: add the exact error message and a screenshot, make the task smaller. Try once more.');
  } else {
    S.ladder.strikes = 0;
    if(rung < 2){
      const from = stepModel(n), to = LADDER[rung+1];
      S.ladder.rung = rung+1;
      if(to==='fable' && n!==1 && n!==5){
        showLadderMsg('Genuine emergency — Fable’s third permitted use (Sonnet AND Opus have each failed twice). Escalation prompt copied.');
      } else {
        showLadderMsg('Two strikes — climb one rung. '+MODELS[to].name+' takes over. Escalation prompt copied.');
      }
      copyText(escalationPrompt(from,to),'Escalation prompt copied for '+MODELS[to].name+'.');
    } else {
      showLadderMsg('Fable has had its two tries. Make the task smaller and clearer — or split it into two smaller tasks. Never argue with a model for an hour.');
    }
  }
  save(); render();
}
function ladderSolve(){
  S.ladder = {rung:0, strikes:0};
  ladderMsgText = '';
  save(); render();
  toast('Solved — back home to Sonnet (Rule 1).');
}
let ladderMsgText = '';
function showLadderMsg(msg){ ladderMsgText = msg; }
function ladderTap(rung){
  const n = S.currentStep;
  if(LADDER[rung]==='fable' && n!==1 && n!==5 && !(S.ladder.rung===2)){
    toast('Rule 2 — Fable opens twice per project. This isn’t one of them.', true);
    return;
  }
  if(rung===0){ ladderSolve(); return; }
  S.ladder.rung = rung; S.ladder.strikes = 0;
  ladderMsgText = '';
  save(); render();
}

/* =====================================================================
   BINDINGS
===================================================================== */
function bindRail(){
  document.querySelectorAll('[data-ref]').forEach(b=>b.addEventListener('click',()=>{
    S.view='reference'; save(); render(b.dataset.ref);
  }));
  // ladder + coin widgets can appear twice (rail + inline) — bind them all
  document.querySelectorAll('[data-act="fail"]').forEach(b=>b.addEventListener('click',ladderFail));
  document.querySelectorAll('[data-act="solve"]').forEach(b=>b.addEventListener('click',ladderSolve));
  document.querySelectorAll('[data-act="finish"]').forEach(b=>b.addEventListener('click',()=>{
    S.view='finish'; save(); render();
  }));
  document.querySelectorAll('[data-rung]').forEach(b=>b.addEventListener('click',()=>ladderTap(+b.dataset.rung)));
  if(ladderMsgText){
    document.querySelectorAll('.ladder-msg').forEach(el=>{el.textContent=ladderMsgText;el.classList.add('on');});
  }
}
function bindHome(){
  const btnCopy = $('#btnCopy');
  if(btnCopy) btnCopy.addEventListener('click',()=>{
    const st = step(S.currentStep), ti = currentTaskIndex(S.currentStep);
    const pr = st.prompts.find(x=>x.id===st.tasks[ti].copy);
    if(pr) copyText(fillPrompt(pr.text, pr.noFill));
  });
  document.querySelectorAll('[id="btnStuck"]').forEach(b=>b.addEventListener('click',()=>{
    copyText(stuckPrompt(),'Help prompt copied — paste it into Claude (Sonnet) and describe what’s happening.');
  }));
  const btnDone = $('#btnDone');
  if(btnDone) btnDone.addEventListener('click',tickCurrentTask);
  const btnComplete = $('#btnComplete');
  if(btnComplete) btnComplete.addEventListener('click',completeStep);
  document.querySelectorAll('[data-gate]').forEach(b=>b.addEventListener('click',()=>{
    const i = +b.dataset.gate;
    ps(S.currentStep).gates[i] = !ps(S.currentStep).gates[i];
    save(); render();
  }));
  document.querySelectorAll('[data-step]').forEach(b=>b.addEventListener('click',()=>openStepCard(+b.dataset.step)));
  bindRail();
}

/* =====================================================================
   MAIN RENDER
===================================================================== */
function render(refId){
  renderNav(); renderCoins();
  if(S.view==='finish'){ renderFinish(); return; }
  if(S.view==='reference'){ renderReference(refId); return; }
  renderHome();
}
if(!window.WALKTHROUGH_V2){
  document.querySelectorAll('[data-nav]').forEach(btn=>btn.addEventListener('click',()=>{
    const k = btn.dataset.nav;
    if(k==='vars'){ openSetup(true); return; }
    if(k==='map'){ S.view='home'; save(); render();
      const a = $('#mapAnchor'); if(a) a.scrollIntoView({behavior:'smooth'}); return; }
    S.view = k; save(); render();
  }));
  $('#overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeSheet(); });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSheet(); });

  /* boot */
  if(!S.setupDone){ openSetup(false); }
  else { $('#app').classList.add('on'); render(); }
}
</script>

const SOURCE = {raw:'',parts:{},steps:[],ready:false,error:''};
let STORE;
let lastFocus = null;
let exampleTab = 'result';
let timerTick = null;

function esc(value=''){
  return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function scrollToStart(){
  window.scrollTo(0,0);
}

function uid(){
  if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'p-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,9);
}

function defaultSettings(){
  return {
    defaultModel:'sonnet',
    tools:{kimi:true,coderabbit:false,codex:true},
    hosting:'Cloudflare Pages',
    track:'practice',
    frontierCredits:2
  };
}

function blankStepState(){
  return {tasks:{},gates:{},done:false,note:''};
}

function newProject(name='My first project', vars={}){
  const settings = JSON.parse(JSON.stringify(STORE?.defaults || defaultSettings()));
  const perStep = {};
  STEP_META.forEach(step=>{perStep[step.n]=blankStepState();});
  return {
    id:uid(),name,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),
    setupDone:false,
    vars:{idea:'',audience:'',feeling:'',sections:'',...vars},
    settings,
    currentStep:0,
    view:'home',
    perStep,
    frontier:{total:settings.frontierCredits,remaining:settings.frontierCredits,active:null,history:[]},
    finished:false,
    liveUrl:''
  };
}

function normalizeProject(project){
  const base = newProject(project?.name || 'My project');
  const out = {...base,...project};
  out.vars = {...base.vars,...(project?.vars||{})};
  out.settings = {...base.settings,...(project?.settings||{})};
  out.settings.tools = {...base.settings.tools,...(project?.settings?.tools||{})};
  out.perStep = {};
  STEP_META.forEach(step=>{
    const got = project?.perStep?.[step.n] || {};
    out.perStep[step.n] = {
      ...blankStepState(),...got,
      tasks:{...(got.tasks||{})},gates:{...(got.gates||{})}
    };
  });
  out.currentStep = Math.max(0,Math.min(10,Number(out.currentStep)||0));
  out.frontier = {...base.frontier,...(project?.frontier||{})};
  out.frontier.history = Array.isArray(out.frontier.history)?out.frontier.history:[];
  return out;
}

function migrateV1(raw){
  try{
    const old = JSON.parse(raw);
    const name = old.vars?.name || 'Migrated v1 project';
    const project = newProject(name,{
      idea:old.vars?.idea||'',audience:old.vars?.audience||'',
      feeling:old.vars?.feeling||'',sections:old.vars?.sections||''
    });
    project.setupDone = !!old.setupDone;
    project.currentStep = Math.max(0,Math.min(10,Number(old.currentStep)||0));
    project.finished = !!old.finished;
    project.liveUrl = old.liveUrl||'';
    STEP_META.forEach(step=>{
      const was = old.perStep?.[step.n];
      if(was?.done){
        project.perStep[step.n].done = true;
        STEP_TASKS[step.n].forEach(task=>{project.perStep[step.n].tasks[task.id]=true;});
        STEP_GATES[step.n].forEach(gate=>{project.perStep[step.n].gates[gate.id]=true;});
      }
    });
    const remaining = Number.isFinite(Number(old.coins))?Math.max(0,Number(old.coins)):2;
    project.frontier.remaining = remaining;
    project.frontier.total = Math.max(2,remaining);
    return project;
  }catch(error){
    return null;
  }
}

function loadStore(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved){
      const parsed = JSON.parse(saved);
      const defaults = {...defaultSettings(),...(parsed.defaults||{})};
      defaults.tools = {...defaultSettings().tools,...(parsed.defaults?.tools||{})};
      const projects = (parsed.projects||[]).map(normalizeProject);
      if(projects.length){
        return {
          schemaVersion:SCHEMA_VERSION,defaults,projects,
          activeProjectId:projects.some(p=>p.id===parsed.activeProjectId)?parsed.activeProjectId:projects[0].id
        };
      }
    }
  }catch(error){}
  const seed = {schemaVersion:SCHEMA_VERSION,defaults:defaultSettings(),projects:[],activeProjectId:null};
  STORE = seed;
  const migrated = migrateV1(localStorage.getItem(V1_KEY));
  const first = migrated || newProject();
  seed.projects.push(first);
  seed.activeProjectId = first.id;
  return seed;
}

function saveStore(){
  const current = project();
  if(current) current.updatedAt = new Date().toISOString();
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(STORE));}catch(error){}
}

function project(){
  return STORE.projects.find(item=>item.id===STORE.activeProjectId) || STORE.projects[0];
}

function stepState(n){
  return project().perStep[n];
}

function filteredTasks(n){
  const p = project();
  return STEP_TASKS[n].filter(task=>{
    if(task.track && task.track!==p.settings.track) return false;
    if(task.requiresTool && !p.settings.tools[task.requiresTool]) return false;
    return true;
  });
}

function modelForStep(n){
  const p = project();
  const meta = STEP_META[n];
  let key = meta.adaptive ? p.settings.defaultModel : meta.model;
  if(key==='kimi' && !p.settings.tools.kimi) key = p.settings.tools.codex?'codex':p.settings.defaultModel;
  if(key==='codex' && !p.settings.tools.codex) key = p.settings.defaultModel;
  return MODELS[key] ? key : 'sonnet';
}

function promptContext(n){
  const p = project();
  const toolNames = [
    p.settings.tools.codex?'Codex':null,
    p.settings.tools.kimi?'Kimi Code':null,
    p.settings.tools.coderabbit?'CodeRabbit':null
  ].filter(Boolean).join(', ') || 'no optional tools selected';
  return {
    projectName:p.name,
    idea:p.vars.idea||'a premium website',
    audience:p.vars.audience||'the intended audience',
    feeling:p.vars.feeling||'a clear intended feeling',
    sections:p.vars.sections||'the approved page and section list',
    track:p.settings.track,
    hosting:p.settings.hosting,
    tools:toolNames,
    model:MODELS[modelForStep(n)].name,
    review:p.settings.tools.coderabbit?'CodeRabbit-assisted pull-request review':'manual diff and pull-request review'
  };
}

function userPrompt(n){
  return USER_PROMPTS[n](promptContext(n));
}

function currentTask(n=project().currentStep){
  const state = stepState(n);
  return filteredTasks(n).find(task=>!state.tasks[task.id]) || null;
}

function allTasksDone(n){
  return filteredTasks(n).every(task=>!!stepState(n).tasks[task.id]);
}

function allGatesDone(n){
  return STEP_GATES[n].every(gate=>!!stepState(n).gates[gate.id]);
}

function completedCount(){
  return STEP_META.slice(0,10).filter(step=>stepState(step.n).done).length;
}

function progressPercent(){
  return Math.round(completedCount()/10*100);
}

function rulePill(type, compact=false){
  const rule = RULES[type] || RULES.default;
  return `<span class="rule-pill ${type}" aria-label="${esc(rule.short)}">${rule.icon}${compact?'':` <span>${esc(rule.short)}</span>`}</span>`;
}

function legendHtml(){

function inlineMarkdown(value=''){
  const codes = [];
  let text = String(value).replace(/`([^`]+)`/g,(_,code)=>{
    const token = `%%CODE${codes.length}%%`; codes.push(`<code>${esc(code)}</code>`); return token;
  });
  text = esc(text)
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  codes.forEach((code,index)=>{text=text.replace(`%%CODE${index}%%`,code);});
  return text;
}

function ruleTypeFromText(text=''){
  if(text.includes('🛑')) return 'req';
  if(text.includes('🎓')) return 'habit';
  if(text.includes('✅')) return 'default';
  return null;
}

function markdownToHtml(markdown=''){
  const lines = String(markdown).replace(/\r/g,'').split('\n');
  let html = '';
  let i = 0;
  const special = line => /^(#{1,6})\s/.test(line) || /^```/.test(line) ||
    /^\s*[-*]\s+/.test(line) || /^\s*\d+\.\s+/.test(line) ||
    (/^\|/.test(line) && /\|/.test(line.slice(1)));
  while(i<lines.length){
    const line = lines[i];
    if(!line.trim()){i++;continue;}
    if(/^---+$/.test(line.trim())){i++;continue;}
    const fence = line.match(/^```(.*)$/);
    if(fence){
      const code=[]; i++;
      while(i<lines.length && !/^```/.test(lines[i])){code.push(lines[i]);i++;}
      i++;
      html += `<pre><code>${esc(code.join('\n'))}</code></pre>`;
      continue;
    }
    const heading = line.match(/^(#{1,6})\s+(.+)$/);
    if(heading){
      const level = Math.min(5,Math.max(2,heading[1].length+1));
      html += `<h${level}>${inlineMarkdown(heading[2])}</h${level}>`;
      i++;continue;
    }
    if(line.trim().startsWith('|') && i+1<lines.length && /^\s*\|?[\s:|-]+\|/.test(lines[i+1])){
      const rows=[]; rows.push(line); i+=2;
      while(i<lines.length && lines[i].trim().startsWith('|')){rows.push(lines[i]);i++;}
      const cells = row=>row.trim().replace(/^\||\|$/g,'').split('|').map(cell=>cell.trim());
      html += '<div class="tbl-wrap"><table><thead><tr>'+cells(rows[0]).map(cell=>`<th>${inlineMarkdown(cell)}</th>`).join('')+'</tr></thead><tbody>';
      rows.slice(1).forEach(row=>{html+='<tr>'+cells(row).map(cell=>`<td>${inlineMarkdown(cell)}</td>`).join('')+'</tr>';});
      html += '</tbody></table></div>';
      continue;
    }
    const unordered = line.match(/^\s*[-*]\s+(.+)$/);
    const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
    if(unordered || ordered){
      const tag = ordered?'ol':'ul';
      html += `<${tag}>`;
      while(i<lines.length){
        const match = lines[i].match(tag==='ol'?/^\s*\d+\.\s+(.+)$/:/^\s*[-*]\s+(.+)$/);
        if(!match) break;
        const type = ruleTypeFromText(match[1]);
        html += `<li${type?` class="canonical-rule ${type}"`:''}>${inlineMarkdown(match[1])}</li>`;
        i++;
      }
      html += `</${tag}>`;
      continue;
    }
    const paragraph=[line.trim()]; i++;
    while(i<lines.length && lines[i].trim() && !special(lines[i])){
      paragraph.push(lines[i].trim()); i++;
    }
    const raw = paragraph.join(' ');
    const type = ruleTypeFromText(raw);
    html += type
      ? `<div class="canonical-rule ${type}">${inlineMarkdown(raw)}</div>`
      : `<p>${inlineMarkdown(raw)}</p>`;
  }
  return html;
}

function splitSource(text){
  const start = text.indexOf('# PART B');
  if(start<0) throw new Error('Parts B–E were not found.');
  SOURCE.raw = text.slice(start).trim();
  const labels = ['B','C','D','E'];
  labels.forEach((label,index)=>{
    const from = SOURCE.raw.indexOf(`# PART ${label}`);
    const next = index<labels.length-1 ? SOURCE.raw.indexOf(`# PART ${labels[index+1]}`) : SOURCE.raw.length;
    SOURCE.parts[label] = SOURCE.raw.slice(from,next).trim();
  });
  STEP_META.forEach((step,index)=>{
    const marker = `## Step ${step.n} —`;
    const from = SOURCE.parts.C.indexOf(marker);
    const nextMarker = index<STEP_META.length-1 ? `## Step ${step.n+1} —` : '# PART D';
    const to = index<STEP_META.length-1 ? SOURCE.parts.C.indexOf(nextMarker,from+marker.length) : SOURCE.parts.C.length;
    SOURCE.steps[step.n] = from>=0 ? SOURCE.parts.C.slice(from,to<0?SOURCE.parts.C.length:to).trim() : '';
  });
  SOURCE.ready = true;
}

async function loadSource(){
  try{
    const response = await fetch('docs/playbook-source.md',{cache:'no-store'});
    if(!response.ok) throw new Error(`Source returned ${response.status}`);
    splitSource(await response.text());
  }catch(error){
    SOURCE.error = 'The canonical playbook could not be loaded. Serve the repository over HTTP and reload.';
  }
}

function toast(message, warn=false){
  const el = $('#toast');
  if(!el) return;
  el.textContent = message;
  el.className = warn?'on warn':'on';
  clearTimeout(toast.timer);
  toast.timer = setTimeout(()=>{el.className='';},3800);
}

function copyText(text, message='Copied — ready to paste.'){
  const fallback = ()=>{
    const input=document.createElement('textarea');
    input.value=text;input.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(input);input.select();
    try{document.execCommand('copy');}catch(error){}
    input.remove();toast(message);
  };
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(text).then(()=>toast(message)).catch(fallback);
  }else fallback();
}

function downloadText(filename,text){
  const blob = new Blob([text],{type:'text/markdown;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href=url;link.download=filename;document.body.appendChild(link);link.click();link.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

  let body=`<div class="eyebrow">YOU ARE HERE</div><h1>Step ${n} — ${esc(meta.title)}</h1>${badgeRow(n)}${modelWarning(n)}`;
  if(n===10){

      <div class="hero-actions"><button class="btn btn-primary" data-action="copy-current">${ICONS.copy} COPY THE PROMPT</button>

  }else if(task){

    body += `<div class="task-count">TASK ${index+1} OF ${tasks.length} &nbsp; ${rulePill(task.rule,true)}</div>
      <div class="task-text">${inlineMarkdown(task.text)}</div>
